<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>InCustom-Helper — инструменты</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg: var(--tg-theme-bg-color, #17212b);
    --text: var(--tg-theme-text-color, #f5f5f5);
    --hint: var(--tg-theme-hint-color, #8794a1);
    --card: var(--tg-theme-secondary-bg-color, #232e3c);
    --accent: var(--tg-theme-button-color, #4a9fe0);
    --accent-text: var(--tg-theme-button-text-color, #fff);
    --link: var(--tg-theme-link-color, #6ab3f3);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
       font:16px/1.45 -apple-system,Segoe UI,Roboto,sans-serif;padding:0 12px 24px}
  .tabs{display:flex;gap:6px;position:sticky;top:0;background:var(--bg);
        padding:10px 0;z-index:10}
  .tab{flex:1;padding:10px 6px;border-radius:12px;background:var(--card);color:var(--hint);
       text-align:center;font-weight:600;cursor:pointer;font-size:14px;border:none}
  .tab.on{background:var(--accent);color:var(--accent-text)}
  .pane{display:none} .pane.on{display:block}
  input,select{width:100%;padding:12px 14px;border-radius:12px;border:none;outline:none;
     background:var(--card);color:var(--text);font-size:16px;margin:6px 0}
  input::placeholder{color:var(--hint)}
  label.row{display:flex;align-items:center;gap:10px;margin:10px 2px;font-size:15px}
  label.row input{width:auto;margin:0}
  button.go{width:100%;padding:14px;border:none;border-radius:12px;background:var(--accent);
     color:var(--accent-text);font-size:16px;font-weight:600;cursor:pointer;margin-top:8px}
  .hint{color:var(--hint);font-size:13px;margin:8px 2px}
  .card{background:var(--card);border-radius:12px;margin:8px 0;padding:12px 14px}
  .item{background:var(--card);border-radius:12px;margin:8px 0;overflow:hidden}
  .term{padding:12px 14px;cursor:pointer;font-weight:600;display:flex;
        justify-content:space-between;align-items:center;gap:8px}
  .code{color:var(--link);font-weight:700;font-size:14px}
  .name{font-weight:400;font-size:14px;color:var(--text)}
  .sec{color:var(--hint);font-weight:400;font-size:12px}
  .body{max-height:0;overflow:hidden;transition:max-height .2s ease;padding:0 14px;
        white-space:pre-line}
  .item.open .body{max-height:none;padding:0 14px 12px}
  .line{display:flex;justify-content:space-between;gap:10px;padding:6px 0;
        border-bottom:1px solid rgba(128,128,128,.15)}
  .line:last-child{border:none}
  .line b{font-weight:700}
  .total{font-size:17px;font-weight:700;color:var(--accent);padding-top:10px}
  .empty{color:var(--hint);text-align:center;padding:24px 10px}
  h2{font-size:16px;margin:6px 2px}
  a{color:var(--link)}
  .sug{background:var(--card);border-radius:12px;margin-top:-2px;overflow:hidden}
  .sug div{padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid rgba(128,128,128,.12)}
  .sug div:last-child{border:none}
</style>
</head>
<body>
<div class="tabs">
  <button class="tab on" data-p="calc" id="tcalc">💰 Расчёт</button>
  <button class="tab" data-p="code" id="tcode">🔎 Код</button>
  <button class="tab" data-p="perm" id="tperm">📋 Док-ты</button>
  <button class="tab" data-p="wiki" id="twiki">📚 Вики</button>
</div>

<!-- РАСЧЁТ -->
<div class="pane on" id="pcalc">
  <h2 id="h_calc">Расчёт таможенных платежей</h2>
  <input id="c_q" placeholder="Товар или код ТН ВЭД…" autocomplete="off">
  <div class="sug" id="c_sug" style="display:none"></div>
  <div class="hint" id="c_picked"></div>
  <input id="c_price" type="number" inputmode="decimal" placeholder="Стоимость (CIF), USD">
  <input id="c_qty" type="number" inputmode="decimal" placeholder="Кол-во в единице ставки (для $/шт, $/кг, $/см³) — необязательно">
  <label class="row"><input type="checkbox" id="c_cert"><span id="c_cert_l">Есть сертификат происхождения (СТ-1/форма А)</span></label>
  <button class="go" id="c_go">Рассчитать</button>
  <div id="c_out"></div>
  <div class="hint" id="c_disc"></div>
</div>

<!-- КОД -->
<div class="pane" id="pcode">
  <h2 id="h_code">Подбор кода ТН ВЭД</h2>
  <input id="k_q" placeholder="Опишите товар…" autocomplete="off">
  <div class="hint" id="k_cnt"></div>
  <div id="k_list"></div>
</div>

<!-- РАЗРЕШИТЕЛЬНЫЕ ДОКУМЕНТЫ -->
<div class="pane" id="pperm">
  <h2 id="h_perm">Разрешительные документы</h2>
  <input id="p_q" placeholder="Товар или код ТН ВЭД…" autocomplete="off">
  <div class="sug" id="p_sug" style="display:none"></div>
  <div class="hint" id="p_picked"></div>
  <div id="p_out"></div>
</div>

<!-- ВИКИ -->
<div class="pane" id="pwiki">
  <h2 id="h_wiki">ВЭД Вики — словарь</h2>
  <input id="w_q" placeholder="Поиск термина…" autocomplete="off">
  <div class="hint" id="w_cnt"></div>
  <div id="w_list"></div>
</div>

<script>
const API = "https://worker-production-4686.up.railway.app";
const WIKI = [{"t": "ТН ВЭД", "s": "ТН ВЭД И КЛАССИФИКАЦИЯ ТОВАРОВ", "b": "Единый классификатор всех товаров в международной торговле. Каждому товару присваивается 10-значный код — он определяет ставку пошлины, НДС, акциза и список разрешительных документов.\nКак устроен код: 8471 30 000 0 — первые 4 цифры это группа, далее подгруппа, уточнение и детализация Узбекистана.\n📌 Пример: Нoutбук — код 8471 30 000 0: пошлина 0%, НДС 12%, нужен сертификат соответствия. Один неверный знак в коде — пересчёт платежей и риск штрафа.\n⚠️ Частая ошибка: Брать код у поставщика не глядя. Поставщик классифицирует по своей стране — коды могут не совпадать. Всегда проверяйте на tarif.customs.uz.", "l": "ru"}, {"t": "ОПИ (Основные правила интерпретации ТН ВЭД)", "s": "ТН ВЭД И КЛАССИФИКАЦИЯ ТОВАРОВ", "b": "Шесть правил, по которым официально определяется код товара. Применяются строго по порядку — если правило 1 не даёт однозначного ответа, переходят к правилу 2.\nПравило 1 — читаем текст товарной позиции и примечания к разделам/группам\nПравило 2 — незавершённые изделия и смеси\nПравило 3 — если подходит несколько позиций: берём более конкретную\nПравило 4 — по аналогии с похожим товаром\nПравило 5 — упаковка и футляры\nПравило 6 — для определения субпозиции внутри позиции\n📌 Пример: Ввозите МФУ — принтер+сканер+копир. Формально подходит три кода. ОПИ правило 3: берём по основной функции. Основная — печать → код по принтеру.\n⚠️ Частая ошибка: Классифицировать «по здравому смыслу», не читая примечания к группе. Примечания имеют приоритет над названием позиции.", "l": "ru"}, {"t": "Классификационное решение", "s": "ТН ВЭД И КЛАССИФИКАЦИЯ ТОВАРОВ", "b": "Официальное решение таможенного органа о присвоении конкретного кода ТН ВЭД конкретному товару. После вынесения — обязательно к применению при всех поставках этого товара.\nКак получить: подаёте заявление в ГТК с описанием товара, техдокументацией и образцами. ГТК выносит решение в течение 30 дней.\n📌 Пример: Медицинский прибор: группа 90 (пошлина 0%) или группа 85 (пошлина 10%)? На партии $200 000 разница $20 000. Классификационное решение фиксирует код раз и навсегда.\n⚠️ Частая ошибка: Думать что это долго и сложно. Один досмотр с переклассификацией обходится дороже, чем месяц на получение решения.", "l": "ru"}, {"t": "Таможенная пошлина", "s": "ТАМОЖЕННЫЕ ПЛАТЕЖИ", "b": "Обязательный платёж государству при ввозе или вывозе товара. Размер зависит от кода ТН ВЭД и страны происхождения.\nАдвалорная — % от таможенной стоимости. Пример: 10% от $10 000 = $1 000\nСпецифическая — фиксированная сумма за единицу. Пример: $2 за кг\nКомбинированная — берётся бо́льшая из двух. Пример: 15%, но не менее $3 за кг\n📌 Пример: Стальные трубы, пошлина 10%, партия $50 000 → пошлина $5 000. Но есть СТ-1 (Россия, СНГ) → ставка 0% → пошлина $0. Один документ = экономия $5 000.\n⚠️ Частая ошибка: Не уточнять наличие сертификата происхождения у поставщика. Это бесплатный документ, который может обнулить пошлину.", "l": "ru"}, {"t": "Таможенная стоимость", "s": "ТАМОЖЕННЫЕ ПЛАТЕЖИ", "b": "База для расчёта всех таможенных платежей. По основному методу (метод 1) — цена сделки плюс расходы на доставку и страховку до границы Узбекистана.\nФормула: Таможенная стоимость = Цена товара (инвойс) + Фрахт до границы УЗ + Страховка + Лицензионные платежи (если есть)\nEXW → добавить фрахт + страховку от склада продавца до границы УЗ\nFOB → добавить фрахт + страховку от порта отгрузки до границы УЗ\nCIF → ничего не добавлять, уже включено\nDAP → вычесть расходы после границы УЗ\n📌 Пример: Товар $10 000 на условиях FOB Шанхай. Фрахт $1 200, страховка $80. Таможенная стоимость = $11 280. От неё считается пошлина и НДС — а не от $10 000 в инвойсе.\n⚠️ Частая ошибка: Указывать в декларации только цену инвойса, забывая добавить фрахт. Таможня видит это по транспортным документам — и назначает КТС.", "l": "ru"}, {"t": "КТС (Корректировка таможенной стоимости)", "s": "ТАМОЖЕННЫЕ ПЛАТЕЖИ", "b": "Решение таможенного инспектора об увеличении заявленной таможенной стоимости. Автоматически влечёт доначисление пошлины и НДС — груз не выпускается до доплаты или внесения обеспечения.\nЦена в инвойсе ниже индикативных цен в базе таможни\nНет документов, подтверждающих цену\nВзаимозависимые продавец и покупатель\nНетипичные условия расчёта (бартер, рассрочка)\n📌 Пример: Ввозите обувь по $8 за пару. В базе таможни индикатив $12. КТС — доначисление с $12. Груз стоит на СВХ. Правильно: внести обеспечение, забрать груз, оспорить с документами.\n⚠️ Частая ошибка: Соглашаться с КТС молча. Это создаёт прецедент — на следующей поставке таможня снова поднимет стоимость.", "l": "ru"}, {"t": "НДС при импорте", "s": "ТАМОЖЕННЫЕ ПЛАТЕЖИ", "b": "Налог на добавленную стоимость при ввозе товара в Узбекистан. Ставка — 12%. Начисляется не на цену товара, а на всю сумму после пошлины и акциза.\nФормула: НДС = (Таможенная стоимость + Пошлина + Акциз) × 12%\nПлательщики НДС берут его в зачёт при дальнейшей реализации. Неплательщики НДС включают в себестоимость.\n📌 Пример: ТС $11 280, пошлина $1 128, акциз $0. База для НДС = $12 408. НДС 12% = $1 489. Для большинства товаров НДС — самый крупный платёж при импорте.\n⚠️ Частая ошибка: Считать только пошлину и забывать про НДС. Особенно критично для малого бизнеса на упрощёнке.", "l": "ru"}, {"t": "Акциз", "s": "ТАМОЖЕННЫЕ ПЛАТЕЖИ", "b": "Дополнительный налог на отдельные категории товаров. Начисляется до НДС и увеличивает базу для его расчёта.\nАлкогольная продукция\nТабак и табачные изделия, электронные сигареты\nНефтепродукты (бензин, дизель, авиакеросин)\nЛегковые автомобили (по объёму двигателя)\nПолиэтиленовые пакеты\n📌 Пример: Автомобиль 2 000 куб.см: акциз считается за каждый куб.см, затем на (ТС + акциз) начисляется НДС 12%. Не зная про акциз, можно ошибиться в расчётах в разы.\n⚠️ Частая ошибка: При импорте автомобилей считать только пошлину и НДС. Акциз + утильсбор нередко превышают все остальные платежи.", "l": "ru"}, {"t": "Таможенный сбор за оформление", "s": "ТАМОЖЕННЫЕ ПЛАТЕЖИ", "b": "Фиксированный платёж за совершение таможенных операций по вашей декларации. Зависит от таможенной стоимости товара. Самый небольшой из всех платежей, но уплачивается вместе с пошлиной и НДС.\n⚠️ Частая ошибка: Забыть включить сбор в расчёт при планировании бюджета поставки.", "l": "ru"}, {"t": "Утилизационный сбор", "s": "ТАМОЖЕННЫЕ ПЛАТЕЖИ", "b": "Платёж за транспортные средства и самоходную технику. Государство берёт авансом — чтобы обеспечить утилизацию техники по окончании срока службы.\nЛегковые и грузовые автомобили\nАвтобусы и микроавтобусы\nСпецтехника: экскаваторы, краны, погрузчики\nПрицепы и полуприцепы\n⚠️ Частая ошибка: Не учитывать сбор при расчёте стоимости техники. Особенно болезненно при импорте автопарка.", "l": "ru"}, {"t": "Преференция", "s": "ТАМОЖЕННЫЕ ПЛАТЕЖИ", "b": "Сниженная или нулевая ставка таможенной пошлины для товаров из определённых стран на основании международных соглашений Узбекистана.\nСНГ (Россия, Казахстан, Беларусь и др.) → СТ-1 → ставка 0% или снижена\nЕС, Япония, Канада → Form A (GSP) → снижена для отдельных товаров\nТурция → двустороннее соглашение → уточнять по коду\nУсловие одно — оригинал сертификата происхождения. Копия не работает.\n📌 Пример: Металлопрокат из России, пошлина 10%, партия $100 000. Просите СТ-1 → пошлина 0%. Экономия $10 000 с одной поставки.\n⚠️ Частая ошибка: Получить сертификат, но не заявить преференцию в декларации. Или забыть попросить СТ-1 у поставщика — после оформления вернуть пошлину нельзя.", "l": "ru"}, {"t": "ГТД (Грузовая таможенная декларация)", "s": "ТАМОЖЕННЫЕ ПРОЦЕДУРЫ И РЕЖИМЫ", "b": "Главный документ таможенного оформления. Вы официально сообщаете таможне: что везёте, откуда, по какой цене, в каком режиме и сколько платежей уплатили. В Узбекистане подаётся электронно через АИС «Декларант» (Gold Soft).\n📌 Практика: Декларацию готовит таможенный брокер. Правильно заполненная — защита при любых претензиях. Ошибка в декларации = штраф или задержка груза.\n⚠️ Частая ошибка: Подавать декларацию в последний момент, когда груз уже стоит на СВХ. СВХ платное. Готовьте документы до прихода груза.", "l": "ru"}, {"t": "ИМ 40 — Выпуск для внутреннего потребления", "s": "ТАМОЖЕННЫЕ ПРОЦЕДУРЫ И РЕЖИМЫ", "b": "Основной режим при импорте. Вы ввозите товар, платите все таможенные платежи — и товар становится вашим полностью. Можно продавать, использовать, перерабатывать без ограничений. 90% всего импорта в Узбекистан оформляется именно по ИМ 40.", "l": "ru"}, {"t": "ЭК 10 — Экспорт", "s": "ТАМОЖЕННЫЕ ПРОЦЕДУРЫ И РЕЖИМЫ", "b": "Режим вывоза товара за пределы Узбекистана с обязательством не возвращать его обратно. При экспорте НДС = 0% (нулевая ставка, не освобождение) — вы можете вернуть входящий НДС.\n⚠️ Частая ошибка: Путать нулевую ставку НДС и освобождение от НДС. При нулевой ставке право на вычет входящего НДС есть. При освобождении — нет.", "l": "ru"}, {"t": "ИМ 70 — Таможенный склад", "s": "ТАМОЖЕННЫЕ ПРОЦЕДУРЫ И РЕЖИМЫ", "b": "Ввозите товар в Узбекистан, но пока не платите пошлины и НДС. Товар хранится на специальном складе под таможенным контролем. Платежи — только когда решаете выпустить товар в продажу или вывезти.\n⚠️ Частая ошибка: Думать что это бесплатно. Хранение на таможенном складе платное. Считайте экономию на платежах против стоимости хранения.", "l": "ru"}, {"t": "ИМ 74 — Переработка на таможенной территории", "s": "ТАМОЖЕННЫЕ ПРОЦЕДУРЫ И РЕЖИМЫ", "b": "Ввозите сырьё или компоненты для производства — пошлины и НДС не платите. Перерабатываете. Готовую продукцию вывозите обратно. Режим для производителей, работающих на экспорт.\n⚠️ Частая ошибка: Нарушить сроки переработки или вывоза. Если товар не вывезен в срок — платежи начисляются автоматически, плюс штрафы.", "l": "ru"}, {"t": "ND 40 — Временный ввоз", "s": "ТАМОЖЕННЫЕ ПРОЦЕДУРЫ И РЕЖИМЫ", "b": "Ввозите товар на время — с обязательством вывезти обратно. Пошлины и НДС либо не платите совсем, либо платите частично. Для выставочного оборудования, профессиональной техники для съёмок, корпоративного транспорта.\n⚠️ Частая ошибка: Забыть про срок и не вывезти товар вовремя. Нарушение — платежи + штраф.", "l": "ru"}, {"t": "Транзит (ТТ 10)", "s": "ТАМОЖЕННЫЕ ПРОЦЕДУРЫ И РЕЖИМЫ", "b": "Товар едет через Узбекистан из одной страны в другую. Платежи не уплачиваются — товар идёт под таможенным контролем от въезда до выезда. Узбекистан — важный транзитный коридор между Россией/СНГ и Афганистаном, Китаем и Европой.", "l": "ru"}, {"t": "СВХ (Склад временного хранения)", "s": "ТАМОЖЕННЫЕ ПРОЦЕДУРЫ И РЕЖИМЫ", "b": "Место, где груз ждёт пока вы готовите таможенную декларацию. Товар попадает туда сразу после прибытия в страну. Максимальный срок хранения — 2 месяца. Хранение платное — за каждые сутки и за каждую тонну.\n📌 Пример: Груз прибыл в пятницу вечером. Документы не готовы. Декларацию подадите в понедельник. Три дня на СВХ — это деньги. Готовьте документы до прихода груза.\n⚠️ Частая ошибка: Считать СВХ «бесплатной паузой». Это одна из самых распространённых лишних трат при импорте.", "l": "ru"}, {"t": "Условный выпуск", "s": "ТАМОЖЕННЫЕ ПРОЦЕДУРЫ И РЕЖИМЫ", "b": "Груз выпускают до завершения всех проверок. Вы вносите обеспечение — деньги или банковскую гарантию на сумму спорных платежей.\n📌 Практика: Таможня назначила КТС, но груз нужен срочно. Вносите обеспечение → забираете товар → продолжаете оспаривать КТС. Если выиграете — обеспечение вернут.\n⚠️ Частая ошибка: Не знать об этом инструменте и держать груз на СВХ всё время спора.", "l": "ru"}, {"t": "Таможенный досмотр", "s": "ТАМОЖЕННЫЕ ПРОЦЕДУРЫ И РЕЖИМЫ", "b": "Физическая проверка товара инспектором. Вскрывают упаковку, пересчитывают, взвешивают, сверяют с декларацией. Бывает основным, повторным и идентификационным.\n📌 Практика: Досмотр — не наказание. Это инструмент СУР. Попасть на досмотр может любая компания. Главное: сопроводительные документы должны точно соответствовать фактическому грузу.\n⚠️ Частая ошибка: Паниковать при досмотре и пытаться «решить вопрос» неформально. Если документы в порядке — досмотр пройдёт без последствий.", "l": "ru"}, {"t": "СУР (Система управления рисками)", "s": "ТАМОЖЕННЫЕ ПРОЦЕДУРЫ И РЕЖИМЫ", "b": "Автоматизированная система таможни. Анализирует каждую декларацию и решает: выпустить без проверки (зелёный), проверить документы (жёлтый) или назначить досмотр (красный).\n🟢 Зелёный коридор — автовыпуск без проверки\n🟡 Жёлтый коридор — документальная проверка\n🔴 Красный коридор — физический досмотр\n📌 Практика: Попасть в красный коридор не значит что вы нарушили. Это статистика и алгоритмы. Чем дольше работаете чисто — тем чаще зелёный.", "l": "ru"}, {"t": "Инвойс (коммерческий счёт)", "s": "ДОКУМЕНТЫ", "b": "Главный документ сделки от продавца покупателю. Содержит наименование товара, количество, цену, условия поставки и реквизиты сторон. Основной документ для расчёта таможенной стоимости.\nОбязательно в инвойсе: код ТН ВЭД, количество, вес нетто/брутто, цена за единицу, валюта, Incoterms, страна происхождения, реквизиты сторон, номер и дата контракта.\n⚠️ Частая ошибка: Принимать инвойс в любом виде «лишь бы была цена». Неправильно оформленный инвойс — главная причина задержек и КТС.", "l": "ru"}, {"t": "Упаковочный лист (Packing List)", "s": "ДОКУМЕНТЫ", "b": "Детальный список содержимого каждого грузового места: что, сколько, в какой упаковке, вес каждого места. Без него таможня не понимает что находится в каждой коробке — автоматически повышается риск досмотра.\n⚠️ Частая ошибка: Присылать один общий список вместо разбивки по местам. При досмотре инспектор должен видеть содержимое каждой конкретной коробки.", "l": "ru"}, {"t": "CMR", "s": "ДОКУМЕНТЫ", "b": "Транспортная накладная при автомобильной перевозке. Международный стандарт — действует во всех странах, подписавших Конвенцию CMR. Содержит: отправитель, получатель, маршрут, описание груза, условия перевозки. Большинство грузов в Узбекистан едут автотранспортом.", "l": "ru"}, {"t": "TIR (книжка МДП)", "s": "ДОКУМЕНТЫ", "b": "Международная система таможенного транзита для автомобильных перевозок. Книжка TIR — гарантия уплаты таможенных платежей во всех странах маршрута. Без неё — таможенное оформление в каждой транзитной стране отдельно.\n📌 Практика: Большинство фур из Европы и Турции в Узбекистан едут по TIR. Книжка открывается в стране отправления и закрывается в Узбекистане.\n⚠️ Частая ошибка: Путать TIR и CMR. CMR — договор перевозки. TIR — таможенный транзитный документ. Они идут вместе, но это разные вещи.", "l": "ru"}, {"t": "Коносамент (Bill of Lading, B/L)", "s": "ДОКУМЕНТЫ", "b": "Транспортный документ при морской перевозке. Одновременно является: договором перевозки, распиской капитана и товарораспорядительным документом (тот у кого он есть — тот и владелец груза).\n⚠️ Частая ошибка: Не контролировать, на кого выписан коносамент. Если на экспедитора — могут возникнуть проблемы с получением груза.", "l": "ru"}, {"t": "Авианакладная (Air Waybill, AWB)", "s": "ДОКУМЕНТЫ", "b": "Транспортный документ при авиаперевозке. В отличие от коносамента — не является товарораспорядительным. Используется для срочных, высокоценных или скоропортящихся грузов.", "l": "ru"}, {"t": "ЖД накладная (СМГС/CIM)", "s": "ДОКУМЕНТЫ", "b": "Транспортный документ при железнодорожной перевозке. СМГС — для стран СНГ, CIM — для европейских. Основной способ доставки крупных партий из России, Казахстана, Китая.", "l": "ru"}, {"t": "Экспортная декларация страны отправления", "s": "ДОКУМЕНТЫ", "b": "Документ, которым иностранный продавец оформил вывоз товара у себя в стране. Подтверждает: товар легально покинул страну по заявленной цене.\n📌 Практика: Таможня Узбекистана запрашивает при КТС. Если цена на выходе совпадает с вашим инвойсом — сильный аргумент против КТС.\n⚠️ Частая ошибка: Не просить у поставщика заранее. После отгрузки получить сложнее.", "l": "ru"}, {"t": "Страховой полис (карго-страхование)", "s": "ДОКУМЕНТЫ", "b": "Документ, подтверждающий страхование груза на время перевозки. Покрывает риски утраты, повреждения, кражи.\nПри CIF продавец обязан застраховать груз — но минимальное покрытие (ICC C, 110% стоимости). Если хотите полное покрытие — прописывайте ICC A в контракте. При EXW, FOB — страхуете груз сами. Страховая премия включается в таможенную стоимость.", "l": "ru"}, {"t": "Сертификат происхождения", "s": "ДОКУМЕНТЫ", "b": "Документ, подтверждающий страну происхождения товара. Даёт право на преференциальную ставку пошлины.\nСТ-1 → страны СНГ → пошлина 0% или снижена\nEUR.1 → товары из ЕС → снижена для отдельных групп\nForm A → GSP (развивающиеся страны) → снижена\nCO (Certificate of Origin) → универсальный, без преференций\n⚠️ Частая ошибка: Запрашивать сертификат после отгрузки. Некоторые виды (например СТ-1) оформляются только до или во время отгрузки.", "l": "ru"}, {"t": "СТ-1", "s": "ДОКУМЕНТЫ", "b": "Сертификат происхождения для товаров из стран СНГ. Даёт право на нулевую или сниженную ставку пошлины. Выдаётся Торгово-промышленной палатой страны-экспортёра.\nСтраны: Россия, Казахстан, Беларусь, Кыргызстан, Таджикистан, Армения, Азербайджан, Молдова, Украина.", "l": "ru"}, {"t": "Контракт (внешнеторговый)", "s": "ДОКУМЕНТЫ", "b": "Основной юридический документ между вами и иностранным партнёром.\nПолные реквизиты сторон\nОписание товара (наименование, код ТН ВЭД, количество, качество)\nЦена и валюта\nУсловия поставки (Incoterms)\nУсловия оплаты (предоплата, аккредитив, отсрочка)\nПорядок оформления разрешительных документов\nПрименимое право и порядок разрешения споров\n⚠️ Частая ошибка: Не прописывать кто оформляет сертификат происхождения и разрешительные документы. Потом выясняется что никто.", "l": "ru"}, {"t": "Спецификация к контракту", "s": "ДОКУМЕНТЫ", "b": "Приложение к контракту с детальным описанием каждой партии: наименования, артикулы, количество, цены по позициям. Неотъемлемая часть контракта. При регулярных поставках удобнее рамочный контракт + спецификация на каждую партию.", "l": "ru"}, {"t": "Сертификат качества", "s": "ДОКУМЕНТЫ", "b": "Документ производителя или независимой лаборатории, подтверждающий качественные характеристики конкретной партии товара.\n📌 Важно: Не путать с сертификатом соответствия. Сертификат качества — от производителя, на партию. Сертификат соответствия — от аккредитованного органа, на соответствие техрегламенту.", "l": "ru"}, {"t": "Технический паспорт / Руководство по эксплуатации", "s": "ДОКУМЕНТЫ", "b": "Документация производителя на технику и оборудование. Обязателен при ввозе оборудования, электроники, медтехники. Должен быть на русском или узбекском языке — или с нотариально заверенным переводом.", "l": "ru"}, {"t": "Акт приёма-передачи", "s": "ДОКУМЕНТЫ", "b": "Документ, фиксирующий фактическую передачу товара от продавца покупателю: дата, место, состояние, количество. Подписанный акт — доказательство того, что товар принят в надлежащем состоянии.\n⚠️ Частая ошибка: Отсутствие акта осложняет предъявление претензий перевозчику или продавцу при недостаче или повреждении.", "l": "ru"}, {"t": "Паспорт сделки", "s": "ДОКУМЕНТЫ", "b": "Регистрация внешнеторгового контракта в уполномоченном банке. Нужна при превышении суммы контракта установленного порога. Без паспорта сделки банк не проведёт платёж за рубеж.\n⚠️ Частая ошибка: Платить иностранному поставщику до открытия паспорта сделки. Банк заблокирует платёж.", "l": "ru"}, {"t": "Сертификат соответствия", "s": "РАЗРЕШИТЕЛЬНЫЕ ДОКУМЕНТЫ", "b": "Подтверждение: товар соответствует стандартам и техническим требованиям Узбекистана. Выдаётся аккредитованным органом после испытаний в лаборатории. Без него таможня не выпустит товар.\n⚠️ Частая ошибка: Начинать оформление сертификата, когда груз уже на СВХ. Сертификат заказывают одновременно с отгрузкой.", "l": "ru"}, {"t": "Схема 7А", "s": "РАЗРЕШИТЕЛЬНЫЕ ДОКУМЕНТЫ", "b": "Самая распространённая схема сертификации для импортёров. Сертификат выдаётся на конкретный контракт, срок действия — 1 год. Один сертификат покрывает все поставки по данному контракту в течение года.\nЧто нужно: код ТН ВЭД и описание товара, контракт и инвойс, техническая документация, образцы для испытаний.", "l": "ru"}, {"t": "Гигиеническое заключение", "s": "РАЗРЕШИТЕЛЬНЫЕ ДОКУМЕНТЫ", "b": "Разрешение органов санитарного надзора на ввоз товаров, контактирующих с человеком или окружающей средой. Орган: Госсанэпиднадзор (sanepid.uz).\nКосметика и парфюмерия\nПосуда и кухонный инвентарь\nДетские товары и игрушки\nПродукты питания, БАДы\nБытовая химия и чистящие средства\n⚠️ Практика: Часто требуется одновременно с сертификатом соответствия. Уточняйте по коду ТН ВЭД заранее.", "l": "ru"}, {"t": "Ветеринарный сертификат", "s": "РАЗРЕШИТЕЛЬНЫЕ ДОКУМЕНТЫ", "b": "Разрешение ветеринарной службы на ввоз животных и продукции животного происхождения. Орган: Госветслужба (vetgov.uz). Ветсертификат страны-экспортёра обязателен — без него груз разворачивают на границе.\nЖивые животные и птица\nМясо и мясопродукты\nРыба и морепродукты\nМолоко и молочные продукты\nКорма для животных, шкуры, шерсть", "l": "ru"}, {"t": "Фитосанитарный сертификат", "s": "РАЗРЕШИТЕЛЬНЫЕ ДОКУМЕНТЫ", "b": "Разрешение карантинной службы на ввоз растений и растительной продукции. Орган: Госкарантинная инспекция (karantin.uz). При малейших признаках карантинных объектов груз могут задержать или уничтожить.\nСвежие фрукты и овощи\nСемена и посадочный материал\nЗерно и продукты его переработки\nСрезанные цветы, растительное сырьё", "l": "ru"}, {"t": "Регистрационное удостоверение (РУ)", "s": "РАЗРЕШИТЕЛЬНЫЕ ДОКУМЕНТЫ", "b": "Специальное разрешение для ввоза лекарственных средств и медицинских изделий. Без РУ таможня медтехнику и лекарства не выпустит. Срок получения — от нескольких месяцев. Орган: Агентство по развитию фармацевтической отрасли (miit.uz).\n⚠️ Частая ошибка: Ввозить медизделие без РУ, рассчитывая «потом разберёмся». Груз арестуют на таможне.", "l": "ru"}, {"t": "Лицензия на импорт/экспорт", "s": "РАЗРЕШИТЕЛЬНЫЕ ДОКУМЕНТЫ", "b": "Специальное государственное разрешение на ввоз или вывоз отдельных категорий товаров. Без лицензии — не только таможня не выпустит, но и уголовная ответственность возможна. Проверяйте перечень на lex.uz до заключения контракта.\nИмпорт: оружие, наркотические вещества, товары двойного назначения, драгметаллы\nЭкспорт: стратегическое сырьё, антиквариат и культурные ценности", "l": "ru"}, {"t": "Incoterms 2020", "s": "УСЛОВИЯ ПОСТАВКИ INCOTERMS 2020", "b": "Международные правила ICC, отвечающие на три вопроса в любой торговой сделке: кто оплачивает доставку и до какого момента, кто несёт риск потери или повреждения груза, кто оформляет документы и разрешения.\nДля таможни: условие поставки определяет таможенную стоимость. Узбекская таможня считает на базе CIF. Если в контракте другое условие — нужно пересчитать к CIF.", "l": "ru"}, {"t": "EXW (Ex Works — франко-завод)", "s": "УСЛОВИЯ ПОСТАВКИ INCOTERMS 2020", "b": "Продавец сделал минимум: подготовил товар на своём складе. Всё остальное — ваша забота. Ваши расходы: погрузка + внутренняя перевозка в стране продавца + экспортное оформление + международная перевозка + страховка + доставка до вашего склада.\n📌 Для таможни: Таможенная стоимость при EXW = цена в инвойсе + ВСЕ расходы до границы УЗ.", "l": "ru"}, {"t": "FOB (Free On Board — франко-борт)", "s": "УСЛОВИЯ ПОСТАВКИ INCOTERMS 2020", "b": "Продавец доставляет товар до борта судна в порту отгрузки и грузит его. После погрузки — риск ваш. Только для морских перевозок.\n📌 Для таможни: Таможенная стоимость при FOB = цена FOB + фрахт до границы УЗ + страховка. Не забудьте добавить фрахт — это частая причина КТС.", "l": "ru"}, {"t": "CIF (Cost, Insurance, Freight)", "s": "УСЛОВИЯ ПОСТАВКИ INCOTERMS 2020", "b": "Продавец оплачивает фрахт и страховку до порта назначения. CIF — базовое условие для расчёта таможенной стоимости в Узбекистане. Все другие условия пересчитываются к нему.\n⚠️ Практика: При CIF продавец выбирает страховку — минимальное покрытие по умолчанию (ICC C). Если хотите полное — прописывайте ICC A в контракте.", "l": "ru"}, {"t": "DAP (Delivered At Place)", "s": "УСЛОВИЯ ПОСТАВКИ INCOTERMS 2020", "b": "Продавец доставляет товар до вашего склада в Узбекистане. Таможенное оформление и платежи — ваша задача.\n📌 Для таможни: Таможенная стоимость при DAP = цена DAP минус расходы после границы УЗ. Запросите у экспедитора расчёт «от границы».", "l": "ru"}, {"t": "DDP (Delivered Duty Paid)", "s": "УСЛОВИЯ ПОСТАВКИ INCOTERMS 2020", "b": "Продавец берёт на себя абсолютно всё: доставку, таможенное оформление, уплату всех пошлин и налогов в вашей стране. В Узбекистане редкость.\n⚠️ Осторожно: При DDP вы теряете контроль над таможенным оформлением. При проверке претензии — к вам как получателю.", "l": "ru"}, {"t": "Валютный контроль", "s": "ВАЛЮТНЫЙ КОНТРОЛЬ И БАНК", "b": "Система наблюдения государства за движением иностранной валюты. В Узбекистане осуществляет Центральный банк (cbu.uz) через уполномоченные коммерческие банки. Каждый платёж за рубеж и каждое поступление кузатади и сверяется с контрактом.", "l": "ru"}, {"t": "Репатриация валютной выручки", "s": "ВАЛЮТНЫЙ КОНТРОЛЬ И БАНК", "b": "Обязанность экспортёра вернуть валютную выручку на счёт в узбекском банке в установленные сроки.\n⚠️ Частая ошибка: Давать иностранному покупателю длинную отсрочку без согласования с банком. Сроки репатриации фиксированы — их нарушение не зависит от условий контракта.", "l": "ru"}, {"t": "Конвертация", "s": "ВАЛЮТНЫЙ КОНТРОЛЬ И БАНК", "b": "Обмен иностранной валюты на узбекские сумы для расчётов внутри страны или уплаты таможенных платежей. Таможенные платежи уплачиваются в сумах по курсу ЦБ на дату подачи декларации. Курс меняется ежедневно.\n📌 Совет: При планировании бюджета поставки закладывайте небольшой резерв на курсовую разницу.", "l": "ru"}, {"t": "Валютная оговорка", "s": "ВАЛЮТНЫЙ КОНТРОЛЬ И БАНК", "b": "Условие в контракте, защищающее от курсовых рисков. Фиксирует, в какой валюте пересчитывается цена при изменении курса. Без оговорки при изменении курса один из партнёров теряет деньги.", "l": "ru"}, {"t": "ГТК (Государственный таможенный комитет)", "s": "ОРГАНИЗАЦИИ И ИСТОЧНИКИ", "b": "Главный таможенный орган Узбекистана. Принимает декларации, контролирует перемещение товаров, устанавливает правила оформления. Сайт: customs.uz. Тарифы и коды: tarif.customs.uz.", "l": "ru"}, {"t": "O'zstandart (Узстандарт)", "s": "ОРГАНИЗАЦИИ И ИСТОЧНИКИ", "b": "Агентство по техническому регулированию и метрологии. Разрабатывает стандарты, аккредитует органы сертификации и испытательные лаборатории. Сайт: standart.uz.", "l": "ru"}, {"t": "O'ZAKK (Узбекский центр аккредитации)", "s": "ОРГАНИЗАЦИИ И ИСТОЧНИКИ", "b": "Ведёт официальный реестр всех аккредитованных органов по сертификации и испытательных лабораторий. Сайт: akkred.uz. Перед обращением в орган — обязательно проверяйте статус аккредитации.\n⚠️ Частая ошибка: Работать с органом без проверки аккредитации. Если орган потерял аккредитацию — выданный им сертификат недействителен.", "l": "ru"}, {"t": "Единое окно (Single Window)", "s": "ОРГАНИЗАЦИИ И ИСТОЧНИКИ", "b": "Государственный портал для получения разрешительных документов в электронном виде. Один вход — все ведомства. Проверить нужен ли документ по коду ТН ВЭД, подать заявку онлайн, отследить статус — всё на singlewindow.uz.", "l": "ru"}, {"t": "Lex.uz", "s": "ОРГАНИЗАЦИИ И ИСТОЧНИКИ", "b": "Официальная база нормативно-правовых актов Республики Узбекистан. Законы, постановления правительства, приказы ведомств — всё в актуальной редакции. Первоисточник для проверки ставок, льгот, требований и запретов.", "l": "ru"}, {"t": "Tarif.customs.uz", "s": "ОРГАНИЗАЦИИ И ИСТОЧНИКИ", "b": "Официальный портал ГТК со ставками таможенных пошлин, кодами ТН ВЭД и дополнительными примечаниями. Первый сайт, который открываете при работе с любым товаром. Бесплатно, актуально, официально.\nВЭД Вики обновляется по мере изменения законодательства\nInCustom-Helper  ·  incustoms.uz  ·  @incustoms_uz", "l": "ru"}, {"t": "TN VED", "s": "TN VED VA TOVARLARNI TASNIFLASH", "b": "Xalqaro savdodagi barcha tovarlarning yagona klassifikatori. Har bir tovarga 10 xonali kod beriladi — u boj stavkasini, QQSni, aksizni va ruxsat beruvchi hujjatlar ro'yxatini belgilaydi.\nKod tuzilishi: 8471 30 000 0 — dastlabki 4 raqam guruh, keyin kichik guruh, aniqlashtirish va O'zbekiston detallashuvi.\n📌 Misol: Noutbuk — kod 8471 30 000 0: boj 0%, QQS 12%, muvofiqlik sertifikati kerak. Koddagi bitta noto'g'ri raqam — to'lovlarni qayta hisoblash va jarima xavfi.\n⚠️ Ko'p uchraydigan xato: Yetkazib beruvchidan kodni ko'r-ko'rona olish. Yetkazib beruvchi o'z mamlakatiga ko'ra tasniflaydi — kodlar mos kelmasligi mumkin. Doim tarif.customs.uz da tekshiring.", "l": "uz"}, {"t": "OPI (TN VED ni talqin qilishning asosiy qoidalari)", "s": "TN VED VA TOVARLARNI TASNIFLASH", "b": "TN VED kodini rasman belgilaydigan oltita qoida. Tartib bo'yicha qo'llaniladi.\n1-qoida — tovar pozitsiyasi matni va bo'lim/guruh izohlarini o'qiymiz\n2-qoida — tugallanmagan yoki yig'ilmagan tovar\n3-qoida — bir nechta pozitsiya mos kelsa: eng aniqrog'ini olamiz\n4-qoida — o'xshash tovar bo'yicha analogiya\n5-qoida — qadoqlash va futlyarlar\n6-qoida — pozitsiya ichida subpozitsiyani aniqlash\n📌 Misol: MFQ olib kirasiz — printer+skaner+ko'chirish. Rasman uchta kod mos. OPI 3-qoida: asosiy funksiya bo'yicha olamiz. Asosiy — chop etish → printer kodi.\n⚠️ Ko'p uchraydigan xato: Guruh izohlarini o'qimasdan 'sog'lom fikr' bilan tasniflash. Izohlar ustunlik qiladi.", "l": "uz"}, {"t": "Tasniflash qarori", "s": "TN VED VA TOVARLARNI TASNIFLASH", "b": "Muayyan tovarga aniq TN VED kodini berish to'g'risidagi bojxonaning rasmiy qarori. Olingandan keyin barcha yetkazib berishlarda majburiy.\nQanday olish: DTQ ga ariza, tovar tavsifi, foto, texhujjatlar topshiriladi. DTQ 30 kun ichida javob beradi.\n📌 Misol: Tibbiy asbob: guruh 90 (boj 0%) yoki guruh 85 (boj 10%)? $200 000 lik partiyada farq $20 000. Tasniflash qarori kodni bir marta va abadiy belgilaydi.\n⚠️ Ko'p uchraydigan xato: Bu uzoq va murakkab deb o'ylab tasodifga ishonib ishlash. Qayta tasniflash bilan bir tekshiruv qaror olishdan qimmatga tushadi.", "l": "uz"}, {"t": "Bojxona boji", "s": "BOJXONA TO'LOVLARI", "b": "Tovarni mamlakatga olib kirish huquqi uchun davlatga to'lov. TN VED kodi va kelib chiqish mamlakatiga bog'liq.\nAdvалор — qiymatdan foiz. Misol: $10 000 dan 10% = $1 000\nSpetsifik — birlik uchun belgilangan summa. Misol: har kg uchun $2\nKombinatsiyalangan — kattaroq summani beruvchisi qo'llaniladi\n📌 Misol: Po'lat quvurlar, boj 10%, $50 000 lik partiya → boj $5 000. Lekin ST-1 sertifikati bor (Rossiya, MDH) → stavka 0% → boj $0. Bir hujjat = $5 000 tejash.\n⚠️ Ko'p uchraydigan xato: Yetkazib beruvchidan kelib chiqish sertifikati so'ramaslik. Bu bepul hujjat bojni butunlay bekor qilishi mumkin.", "l": "uz"}, {"t": "Bojxona qiymati", "s": "BOJXONA TO'LOVLARI", "b": "Barcha to'lovlar hisoblanadigan asos. Asosiy usul bo'yicha: tovar narxi + O'zbekiston chegarasigacha yetkazib berish + sug'urta.\nFormula: Bojxona qiymati = Tovar narxi (invoys) + Chegaragacha fracht + Sug'urta + Litsenzion to'lovlar\nEXW → hammasini qo'shing: yuklash, fracht, sug'urta\nFOB → jo'natish portidan fracht va sug'urtani qo'shing\nCIF → hech narsa qo'shilmaydi, allaqachon kiritilgan\nDAP → O'zbekiston chegarasidan keyingi xarajatlarni ayiring\n📌 Misol: Tovar $10 000, FOB Shanxay. Fracht $1 200, sug'urta $80. Bojxona qiymati = $11 280. Aynan shu summadan boj va QQS hisoblanadi — invoysdagi $10 000 dan emas.\n⚠️ Ko'p uchraydigan xato: Deklaratsiyada frachtsiz faqat invoys narxini ko'rsatish. Bojxona buni ko'radi va BTS tayinlaydi.", "l": "uz"}, {"t": "BTS (Bojxona qiymatini tuzatish)", "s": "BOJXONA TO'LOVLARI", "b": "Inspektorning invoysdagi narxdan yuqoriroq deb qarori. To'lovlar qo'shimcha hisoblanadi — yuk to'lamaguncha yoki garov kiritmaguncha turadi.\nNarx bojxona bazasidagi o'xshash tovarlarnikidan past\nNarxni tasdiqlovchi hujjatlar yetarli emas\nSotuvchi va xaridor bog'liq shaxslar\nNoodatiy to'lov shartlari (barter, bo'lib to'lash)\n📌 Misol: Poyabzal $8 juftdan. Indikativ $12. BTS — $12 dan qo'shimcha to'lov. Yuk VXS da turadi. To'g'ri: garov kiriting, yukni oling, hujjatlar bilan bahslashing.\n⚠️ Ko'p uchraydigan xato: Jimgina BTSga rozi bo'lish. Bu pretsedent yaratadi — keyingi yetkazib berishda ham $12 bo'ladi.", "l": "uz"}, {"t": "Import QQS", "s": "BOJXONA TO'LOVLARI", "b": "O'zbekistonga tovar olib kirishda qo'shilgan qiymat solig'i. Stavka — 12%. Tovar narxiga emas, boj va aksizdan keyingi umumiy summaga hisoblanadi.\nFormula: QQS = (Bojxona qiymati + Boj + Aksiz) × 12%\nUMAS (QQS to'lovchisi) → to'langan QQSni sotishda hisobga olasiz. Soddalashtirilgan tizim → QQS tannarxga kiritiladi.\n📌 Misol: TS $11 280, boj $1 128, aksiz $0. QQS bazasi $12 408. QQS 12% = $1 489. Ko'pchilik tovarlar uchun QQS — eng katta to'lov.\n⚠️ Ko'p uchraydigan xato: Faqat bojni hisoblash va QQSni unutish. Ayniqsa soddalashtirilgan tizimda kichik biznes uchun muhim.", "l": "uz"}, {"t": "Aksiz", "s": "BOJXONA TO'LOVLARI", "b": "Muayyan tovar toifalari uchun qo'shimcha soliq. QQS dan oldin hisoblanadi va uning bazasini oshiradi.\nAlkogol va pivo\nTamaki, sigaretlar, elektron sigaretlar\nNeft mahsulotlari: benzin, dizel, aviakerоsin\nYengil avtomobillar (dvigatel hajmiga qarab)\nPolietilen paketlar\n📌 Misol: 2 000 kub.sm dvigatellik avtomobil. Aksiz har kub.sm uchun hisoblanadi. Keyin (TS + aksiz) ga 12% QQS. Aksizni bilmasdan hisoblasangiz natija bir necha baravar xato.\n⚠️ Ko'p uchraydigan xato: Avtomobil importida faqat boj va QQSni hisoblash. Aksiz + utilizatsiya yig'imi ko'pincha boshqa barcha to'lovlardan ko'proq.", "l": "uz"}, {"t": "Bojxona yig'imi", "s": "BOJXONA TO'LOVLARI", "b": "Deklaratsiyangiz bo'yicha bojxona operatsiyalari uchun belgilangan to'lov. Tovarning bojxona qiymatiga bog'liq. Barcha to'lovlar ichida eng kichigi, lekin boj va QQS bilan birga to'lanadi.\n⚠️ Ko'p uchraydigan xato: Yetkazib berish byudjetini rejalashtirishda yig'imni hisobga olmaslik.", "l": "uz"}, {"t": "Utilizatsiya yig'imi", "s": "BOJXONA TO'LOVLARI", "b": "Transport vositalari va o'z yuruvchi texnika uchun to'lov. Texnikani utilizatsiya qilishni ta'minlash uchun davlat oldindan oladi.\nYengil va yuk avtomobillari\nAvtobus va mikroavtobuslar\nMaxsus texnika: ekskavatorlar, kranlar, yuk ko'targichlar\nTirkamalar va yarim tirkamalar\n⚠️ Ko'p uchraydigan xato: Texnika qiymatini hisoblashda yig'imni hisobga olmaslik. Avtoparkni importda byudjet minusga ketishi mumkin.", "l": "uz"}, {"t": "Preferentsiya", "s": "BOJXONA TO'LOVLARI", "b": "Muayyan mamlakatlardan kelgan tovarlar uchun kamaytirilgan yoki nol bojxona boji stavkasi. O'zbekistonning xalqaro shartnomalari asosida.\nMDH (Rossiya, Qozog'iston, Belarus va boshqalar) → ST-1 → boj 0% yoki kamaytirilgan\nYeI, Yaponiya, Kanada → Form A (GSP) → alohida tovarlar uchun kamaytirilgan\nTurkiya → ikki tomonlama shartnoma → aniq kod bo'yicha aniqlash\nBitta shart — kelib chiqish sertifikatining originali. Nusxa ishlamaydi.\n📌 Misol: Metalloprokat Rossiyadan, boj 10%, $100 000 lik partiya. ST-1 so'rasiz → boj 0%. Tejash $10 000.\n⚠️ Ko'p uchraydigan xato: Sertifikatni olish, lekin deklaratsiyada preferentsiyani e'lon qilmaslik. Yoki ST-1 so'rashni unutish.", "l": "uz"}, {"t": "YTD (Yuk bojxona deklaratsiyasi)", "s": "BOJXONA TARTIBLARI VA REJIMLARI", "b": "Bojxona rasmiylashtirishning asosiy hujjati. O'zbekistonda AIS 'Deklarant' (Gold Soft dasturi) orqali elektron shaklda topshiriladi. Qabul qilingan deklaratsiyasiz yuk chiqarilmaydi.\n⚠️ Ko'p uchraydigan xato: Yuk VXS da turganida oxirgi daqiqada deklaratsiya topshirish. VXS — pullik. Yuk kelishidan oldin hujjatlar tayyorlanadi.", "l": "uz"}, {"t": "IM 40 — Ichki iste'mol uchun chiqarish", "s": "BOJXONA TARTIBLARI VA REJIMLARI", "b": "Importdagi asosiy rejim. Barcha bojxona to'lovlari to'lanadi — tovar to'liq sizniki bo'ladi. Cheklovsiz sotish, ishlatish, qayta ishlash mumkin. O'zbekistonga barcha importning 90% aynan IM 40 bo'yicha.", "l": "uz"}, {"t": "EK 10 — Eksport", "s": "BOJXONA TARTIBLARI VA REJIMLARI", "b": "O'zbekistondan tovarni olib chiqish rejimi. Eksportda QQS = 0% (nol stavka, ozod qilish emas) — kiruvchi QQSni qaytarib olish mumkin.\n⚠️ Ko'p uchraydigan xato: Nol QQS stavkasini QQSdan ozod qilish bilan aralashtirib yuborish. Nol stavkada chegirma huquqi bor, ozod qilishda — yo'q.", "l": "uz"}, {"t": "IM 70 — Bojxona ombori", "s": "BOJXONA TARTIBLARI VA REJIMLARI", "b": "Tovarni olib kirasiz, lekin hozircha boj va QQS to'lamaysiz. Tovar bojxona nazorati ostida maxsus omborida saqlanadi. To'lovlar — faqat sotuvga chiqarish yoki qaytarib olib ketishga qaror qilganda.\n⚠️ Ko'p uchraydigan xato: Bu bepul deb o'ylash. Bojxona omborida saqlash — pullik.", "l": "uz"}, {"t": "IM 74 — Hududda qayta ishlash", "s": "BOJXONA TARTIBLARI VA REJIMLARI", "b": "Ishlab chiqarish uchun xom ashyo olib kirasiz — boj va QQS to'lamaysiz. Qayta ishlaysiz. Tayyor mahsulotni qaytarib olib chiqasiz. Eksportga ishlaydigan ishlab chiqaruvchilar uchun rejim.\n⚠️ Ko'p uchraydigan xato: Qayta ishlash yoki olib chiqish muddatlarini buzish. Tovar o'z vaqtida olib chiqilmasa — to'lovlar avtomatik + jarimalar.", "l": "uz"}, {"t": "ND 40 — Vaqtinchalik olib kirish", "s": "BOJXONA TARTIBLARI VA REJIMLARI", "b": "Tovarni vaqtincha olib kirasiz — qaytarib olib chiqish majburiyati bilan. Boj va QQS yoki umuman to'lanmaydi, yoki qisman. Ko'rgazma uskunalari, professional texnika, korporativ transport uchun.\n⚠️ Ko'p uchraydigan xato: Muddatni unutib, tovarni o'z vaqtida olib chiqmaslik. Qoidabuzarlik — to'lovlar + jarima.", "l": "uz"}, {"t": "Tranzit (TT 10)", "s": "BOJXONA TARTIBLARI VA REJIMLARI", "b": "Tovar bir mamlakatdan ikkinchisiga O'zbekiston orqali o'tadi. To'lovlar to'lanmaydi — bojxona nazorati ostida boradi. O'zbekiston — Rossiya/MDH va Afg'oniston, Xitoy va Yevropa o'rtasidagi muhim tranzit yo'lak.", "l": "uz"}, {"t": "VXS (Vaqtinchalik saqlash ombori)", "s": "BOJXONA TARTIBLARI VA REJIMLARI", "b": "Yuk mamlakatga kelgandan keyin deklaratsiya tayyorlanguncha 'kutadigan' joy. Maksimal muddat — 2 oy. Saqlash pullik — har sutkada va har tonnada.\n📌 Misol: Yuk juma kechqurun keldi. Hujjatlar tayyor emas. Deklaratsiyani dushanba kuni topshirasiz. VXS da uch kun — bu pul. Yuk kelishidan oldin hujjatlarni tayyorlang.\n⚠️ Ko'p uchraydigan xato: VXSni 'bepul pauza' deb hisoblash. Bu importdagi eng keng tarqalgan keraksiz xarajat.", "l": "uz"}, {"t": "Shartli chiqarish", "s": "BOJXONA TARTIBLARI VA REJIMLARI", "b": "Yuk barcha tekshiruvlar tugaguncha chiqariladi. Garov kiritiladi — bahsli to'lovlar summasiga pul yoki bank kafolati.\n📌 Amalda: BTS tayinlandi, lekin yuk shoshilinch kerak. Garov kiriting → tovarni oling → BTS ni bahslashtirishda davom eting. Yutib chiqsangiz — garov qaytariladi.\n⚠️ Ko'p uchraydigan xato: Bu vositani bilmaslik va yukni VXS da bahslashish vaqti ichida ushlab turish.", "l": "uz"}, {"t": "Bojxona tekshiruvi", "s": "BOJXONA TARTIBLARI VA REJIMLARI", "b": "Inspektorning tovarni jismoniy tekshiruvi. Qadoqni ochadi, sanaydi, tortadi, deklaratsiya bilan solishtiradi. Asosiy, takroriy va identifikatsiya turlari mavjud.\n📌 Amalda: Tekshiruv — jazo emas. Bu XBT vositasi. Har qanday kompaniya tekshiruvga tushishi mumkin. Asosiysi: hujjatlar haqiqiy yukka to'liq mos bo'lishi kerak.\n⚠️ Ko'p uchraydigan xato: Vahima qilish va muammoni norasmiy hal qilishga urinish. Hujjatlar tartibda bo'lsa — oqibatsiz o'tadi.", "l": "uz"}, {"t": "XBT (Xavflarni boshqarish tizimi)", "s": "BOJXONA TARTIBLARI VA REJIMLARI", "b": "Bojxonaning avtomatlashtirilgan tizimi. Har bir deklaratsiyani tahlil qiladi va nazorat shaklini hal qiladi.\n🟢 Yashil yo'lak — tekshiruvsiz avtochiqarish\n🟡 Sariq yo'lak — hujjatli tekshiruv\n🔴 Qizil yo'lak — jismoniy tekshiruv\n📌 Amalda: Qizil yo'lakka tushish siz nimadir buzgansiz degani emas. Bu statistika va algoritmlar. Qanchalik uzoq toza ishlasangiz — shunchalik ko'p yashil.", "l": "uz"}, {"t": "Invoys (tijorat hisob-fakturasi)", "s": "HUJJATLAR", "b": "Sotuvchidan xaridorga bitimning asosiy hujjati. Bojxona qiymatining asosi. Invoysdа majburiy: TN VED kodi, miqdor, og'irlik, narx, valyuta, Incoterms, kelib chiqish mamlakati, tomonlar rekvizitlari.\n⚠️ Ko'p uchraydigan xato: 'Faqat narxi bo'lsa bo'ldi' deb ixtiyoriy shaklda invoys qabul qilish. Noto'g'ri rasmiylashtirilgan invoys — kechikishlar va BTSning asosiy sababi.", "l": "uz"}, {"t": "Qadoqlash varaqasi (Packing List)", "s": "HUJJATLAR", "b": "Har bir yuk o'rnining tarkibini batafsil ro'yxati. Usiz bojxona har bir qutida nima borligini tushunmaydi — tekshiruv xavfi oshadi.\n⚠️ Ko'p uchraydigan xato: O'rinlarga bo'lish o'rniga umumiy ro'yxat yuborish. Tekshiruvda inspektor har bir aniq qutining tarkibini ko'rishi kerak.", "l": "uz"}, {"t": "CMR", "s": "HUJJATLAR", "b": "Avtomobil tashishidagi transport xati. Xalqaro standart — CMR Konventsiyasini imzolagan barcha mamlakatlarda amal qiladi. O'zbekistonga yuklarning aksariyati avtotransport bilan keladi.", "l": "uz"}, {"t": "TIR (MDP kitobchasi)", "s": "HUJJATLAR", "b": "Avtomobil tashishlaridagi xalqaro bojxona tranziti tizimi. TIR kitobchasi — marshrut bo'ylab barcha mamlakatlarda bojxona to'lovlari kafolati. Usiz — har bir tranzit mamlakatda alohida bojxona rasmiylashtiriladi.\n📌 Amalda: Yevropa va Turkiyadan keluvchi yuk mashinalari O'zbekistonga TIR orqali keladi. Kitobcha jo'natish mamlakatida ochiladi, O'zbekistonda yopiladi.\n⚠️ Ko'p uchraydigan xato: TIR va CMRni aralashtirib yuborish. CMR — tashish shartnomasi. TIR — bojxona tranzit hujjati. Birga boradilar, lekin turli hujjatlar.", "l": "uz"}, {"t": "Konosament (Bill of Lading, B/L)", "s": "HUJJATLAR", "b": "Dengiz tashishidagi transport hujjati. Bir vaqtning o'zida: tashish shartnomasi, kapitan tilxati va tovar-tasarruf hujjati.\n⚠️ Ko'p uchraydigan xato: Konosament kimga rasmiylashtirilganini nazorat qilmaslik. Ekspeditorga bo'lsa — olishda muammolar bo'lishi mumkin.", "l": "uz"}, {"t": "Havo yuk xati (Air Waybill, AWB)", "s": "HUJJATLAR", "b": "Havo tashishidagi transport hujjati. Konosamentdan farqli o'laroq — tovar-tasarruf hujjati emas. Shoshilinch, yuqori qiymatli yoki tez buzuladigan yuklarда ishlatiladi.", "l": "uz"}, {"t": "Temir yo'l xati (SMGS/CIM)", "s": "HUJJATLAR", "b": "Temir yo'l tashishidagi transport hujjati. SMGS — MDH mamlakatlari uchun, CIM — Yevropa uchun. Rossiya, Qozog'iston, Xitoydan katta partiyalarni yetkazishning asosiy usuli.", "l": "uz"}, {"t": "Eksport mamlakatining eksport deklaratsiyasi", "s": "HUJJATLAR", "b": "Chet el sotuvchisi tovarni o'z mamlakatida olib chiqishda rasmiylashtirgan hujjat. Tovar e'lon qilingan narxda mamlakatni qonuniy tark etganini tasdiqlaydi.\n📌 Amalda: O'zbek bojxonasi BTS da so'raydi. Narx invoys bilan mos kelsa — BTSga qarshi kuchli argument.\n⚠️ Ko'p uchraydigan xato: Yetkazib beruvchidan oldindan so'ramaslik. Jo'natilgandan keyin olish qiyinroq.", "l": "uz"}, {"t": "Sug'urta polisi (kargo-sug'urta)", "s": "HUJJATLAR", "b": "Tashish vaqtida yukni sug'urtalanganligini tasdiqlovchi hujjat. Yo'qolish, shikastlanish, o'g'irlik xavflarini qoplaydi.\nCIF da sotuvchi sug'urtalaydi — lekin minimal qoplash (ICC C, 110%). To'liq qoplash uchun — shartnomada ICC A ni ko'rsating. EXW, FOB da — o'zingiz sug'urtalaasiz. Sug'urta mukofoti bojxona qiymatiga kiritiladi.", "l": "uz"}, {"t": "Kelib chiqish sertifikati", "s": "HUJJATLAR", "b": "Tovarning kelib chiqish mamlakatini tasdiqlovchi hujjat. Preferentsial boj stavkasiga hуқуқ beradi.\nST-1 → MDH mamlakatlari → boj 0% yoki kamaytirilgan\nEUR.1 → YeI tovarlari → alohida guruhlar uchun kamaytirilgan\nForm A → GSP (rivojlanayotgan mamlakatlar) → kamaytirilgan\nCO (Certificate of Origin) → universal, preferentsiyasiz\n⚠️ Ko'p uchraydigan xato: Jo'natilgandan keyin sertifikat so'rash. Ba'zi turlar (masalan ST-1) faqat jo'natishdan oldin rasmiylashtiriladi.", "l": "uz"}, {"t": "ST-1", "s": "HUJJATLAR", "b": "MDH mamlakatlari tovarlarining kelib chiqish sertifikati. Nol yoki kamaytrilgan boj stavkasiga hуқуқ beradi. Eksport mamlakatining Savdo-sanoat palatasi tomonidan beriladi.\nMamlakatlar: Rossiya, Qozog'iston, Belarus, Qirg'iziston, Tojikiston, Armaniston, Ozarbayjon, Moldova, Ukraina.", "l": "uz"}, {"t": "Shartnoma (tashqi savdo)", "s": "HUJJATLAR", "b": "Siz va chet el hamkoringiz o'rtasidagi asosiy yuridik hujjat.\nTomonlarning to'liq rekvizitlari\nTovar tavsifi (nomi, TN VED kodi, miqdori, sifati)\nNarx va valyuta\nYetkazib berish shartlari (Incoterms)\nTo'lov shartlari (oldindan to'lov, akkreditiv, kechiktirish)\nRuxsat beruvchi hujjatlarni rasmiylаshtirish tartibi\nQo'llaniladigan huquq va nizolarni hal qilish tartibi\n⚠️ Ko'p uchraydigan xato: Kelib chiqish sertifikati va ruxsat beruvchi hujjatlarni kim rasmiylаshtirishi ko'rsatilmagan. Keyin ma'lum bo'ladiki, hech kim qilmagan.", "l": "uz"}, {"t": "Shartnomaga spetsifikatsiya", "s": "HUJJATLAR", "b": "Shartnomaga ilova — har bir partiyaning batafsil tavsifi: nomlar, artikullar, miqdor, narxlar. Shartnomaning ajralmas qismi. Muntazam yetkazib berishda rамкалik shartnoma + spetsifikatsiya qulayroq.", "l": "uz"}, {"t": "Sifat sertifikati", "s": "HUJJATLAR", "b": "Ishlab chiqaruvchi yoki mustaqil laboratoriyaning muayyan tovar partiyasi sifat ko'rsatkichlarini tasdiqlovchi hujjati.\n📌 Muhim: Muvofiqlik sertifikati bilan aralashtirib yubormaslik. Sifat sertifikati — ishlab chiqaruvchidan, partiya uchun. Muvofiqlik sertifikati — akkreditatsiyalangan organdan, texreglamentga muvofiqlik uchun.", "l": "uz"}, {"t": "Texnik pasport / Foydalanish qo'llanmasi", "s": "HUJJATLAR", "b": "Texnika va uskunalar uchun ishlab chiqaruvchi hujjatlari. Uskunalar, elektronika, tibbiy texnikani olib kirishda majburiy. Rus yoki o'zbek tilida bo'lishi — yoki notarial tasdiqlangan tarjima bilan.", "l": "uz"}, {"t": "Qabul-topshirish dalolatnomasi", "s": "HUJJATLAR", "b": "Tovarning sotuvchidan xaridorga haqiqiy topshirilishini qayd etuvchi hujjat: sana, joy, holat, miqdor. Imzolangan dalolatnoma — tovar munosib holatda qabul qilinganining isboti.\n⚠️ Ko'p uchraydigan xato: Dalolatnoma yo'qligida tashuvchi yoki sotuvchiga kamomad yoki shikast yuzasidan da'vo qo'yish qiyinlashadi.", "l": "uz"}, {"t": "Bitim pasporti", "s": "HUJJATLAR", "b": "Tashqi savdo shartnomasini vakolatli bankda ro'yxatdan o'tkazish. Shartnoma summasi belgilangan chegaradan oshganda majburiy. Bitim pasportisiz bank xorijga to'lovni o'tkazmaydi.\n⚠️ Ko'p uchraydigan xato: Bitim pasportini ochishdan oldin chet el yetkazib beruvchisiga to'lash. Bank to'lovni bloklaydi.", "l": "uz"}, {"t": "Muvofiqlik sertifikati", "s": "RUXSAT BERUVCHI HUJJATLAR", "b": "Tasdiq: tovar O'zbekiston texnik talablari va standartlariga javob beradi. Akkreditatsiyalangan sertifikatsiya organi tomonidan laboratoriya sinovlaridan o'tgandan keyin beriladi. Usiz bojxona tovarni chiqarmaydi.\n⚠️ Ko'p uchraydigan xato: Yuk VXS da turganida sertifikat rasmiylashtirish boshlanadi. Sertifikat jo'natish bilan bir vaqtda buyurtma qilinadi.", "l": "uz"}, {"t": "7A sxemasi", "s": "RUXSAT BERUVCHI HUJJATLAR", "b": "Importchilar uchun eng keng tarqalgan sertifikatsiya sxemasi. Sertifikat aniq shartnomaga beriladi, amal qilish muddati — 1 yil. Bitta sertifikat yil davomida ushbu shartnoma bo'yicha barcha yetkazib berishlarni qoplaydi.\nNima kerak: TN VED kodi va tavsif, shartnoma va invoys, texhujjatlar, laboratoriya sinovlari uchun namunalar.", "l": "uz"}, {"t": "Gigienik xulosa", "s": "RUXSAT BERUVCHI HUJJATLAR", "b": "Inson yoki atrof-muhit bilan aloqa qiladigan tovarlarni olib kirish uchun sanitariya nazorati organlarining ruxsati. Organ: Davlat sanitariya-epidemiologiya nazorati (sanepid.uz).\nKosmetika va parfyumeriya\nIdish-tovoq va oshxona uskunchalari\nBolalar tovarlari va o'yinchoqlar\nOziq-ovqat mahsulotlari, BADlar\nMaishiy kimyo va tozalash vositalari\n📌 Amalda: Ko'pincha muvofiqlik sertifikati bilan bir vaqtda talab qilinadi. TN VED kodi bo'yicha oldindan aniqlang.", "l": "uz"}, {"t": "Veterinariya sertifikati", "s": "RUXSAT BERUVCHI HUJJATLAR", "b": "Hayvonlar va hayvon kelib chiqishidagi mahsulotlarni olib kirish uchun veterinariya xizmatining ruxsati. Organ: Davlat veterinariya xizmati (vetgov.uz). Eksport mamlakatining vetsertifikati — chegara oldida majburiy.\nTirik hayvonlar va parrandalar\nGo'sht va go'sht mahsulotlari\nBaliq va dengiz mahsulotlari\nSut va sut mahsulotlari, tuxum\nHayvon uchun ozuqalar, teri, jun", "l": "uz"}, {"t": "Fitosanitariya sertifikati", "s": "RUXSAT BERUVCHI HUJJATLAR", "b": "O'simliklar va o'simlik mahsulotlarini olib kirish uchun karantin xizmatining ruxsati. Organ: Davlat karantin inspeksiyasi (karantin.uz). Karantin ob'ektlarining eng kichik belgilarida yuk ushlanib qolishi yoki yo'q qilinishi mumkin.\nYangi mevalar va sabzavotlar\nUrug'lar va ko'chatlar\nDon va uni mahsulotlari\nKesilgan gullar, o'simlik xom ashyosi", "l": "uz"}, {"t": "Ro'yxatdan o'tkazish guvohnomasi (RG)", "s": "RUXSAT BERUVCHI HUJJATLAR", "b": "Dori vositalari va tibbiy buyumlarni olib kirish uchun maxsus ruxsat. Usiz bojxona tibbiy texnika va dorilarni umuman chiqarmaydi. Olish muddati — bir necha oydan. Organ: Farmatsevtika sanoatini rivojlantirish agentligi (miit.uz).\n⚠️ Ko'p uchraydigan xato: RGsiz tibbiy buyum olib kirish, 'keyin hal qilamiz' deb. Yuk bojxonada hibsga olinadi.", "l": "uz"}, {"t": "Import/eksport litsenziyasi", "s": "RUXSAT BERUVCHI HUJJATLAR", "b": "Alohida tovar toifalarini olib kirish yoki olib chiqish uchun maxsus davlat ruxsati. Litsenziyasiz nafaqat bojxona chiqarmaydi, balki jinoiy javobgarlik ham mumkin. Shartnoma tuzishdan oldin lex.uz da ro'yxatni tekshiring.\nImport: qurol-yarog', narkotik moddalar, ikki maqsadli tovarlar, qimmatbaho metallar\nEksport: strategik xom ashyo, antikvar va madaniy qadriyatlar", "l": "uz"}, {"t": "Incoterms 2020", "s": "YETKAZIB BERISH SHARTLARI INCOTERMS 2020", "b": "ICC ning xalqaro qoidalari. Har qanday savdo bitimida uchta savolga javob beradi: yetkazib berishni kim to'laydi va qaysi momentgacha, yukni yo'qolishi xavfini kim ko'taradi, kim hujjatlar va ruxsatlarni rasmiylаshtiradi.\nBojxona uchun: yetkazib berish sharti bojxona qiymatini belgilaydi. O'zbek bojxonasi CIF asosida hisoblaydi. Boshqa shart bo'lsa — CIF ga qayta hisoblanadi.", "l": "uz"}, {"t": "EXW (Ex Works — zavod franko)", "s": "YETKAZIB BERISH SHARTLARI INCOTERMS 2020", "b": "Sotuvchi minimumni qildi: tovarni o'z omborida tayyorladi. Qolgan hammasi — sizning tashvishingiz. Xarajatlar: yuklash + ichki tashish + eksport rasmiylashtirish + xalqaro tashish + sug'urta + omboringizga yetkazish.\n📌 Bojxona uchun: EXW da bojxona qiymati = invoys narxi + O'zbekiston CHEGARASIGACHA BARCHA xarajatlar.", "l": "uz"}, {"t": "FOB (Free On Board — bort franko)", "s": "YETKAZIB BERISH SHARTLARI INCOTERMS 2020", "b": "Sotuvchi tovarni jo'natish portida kemaga yuklagungacha yetkazadi. Yuklagandan keyin — xavf sizniki. Faqat dengiz tashishlari uchun.\n📌 Bojxona uchun: FOB da bojxona qiymati = FOB narxi + chegaragacha fracht + sug'urta. Fracht qo'shishni unutmang — bu BTSning tez-tez sababi.", "l": "uz"}, {"t": "CIF (Cost, Insurance, Freight)", "s": "YETKAZIB BERISH SHARTLARI INCOTERMS 2020", "b": "Sotuvchi tayinlash portiga fracht va sug'urtani to'laydi. CIF — O'zbekistonda bojxona qiymatini hisoblashning asosiy sharti. Barcha boshqa shartlar unga qayta hisoblanadi.\n⚠️ Amalda: Sotuvchi sug'urtani tanlaydi — sukut bo'yicha minimal qoplash (ICC C). To'liq qoplash kerak bo'lsa — shartnomada ICC A ni ko'rsating.", "l": "uz"}, {"t": "DAP (Delivered At Place)", "s": "YETKAZIB BERISH SHARTLARI INCOTERMS 2020", "b": "Sotuvchi tovarni O'zbekistondagi omboringizga yetkazib beradi. Bojxona rasmiylashtirish va to'lovlar — sizning vazifangiz.\n📌 Bojxona uchun: DAP da bojxona qiymati = DAP narxi minus O'zbekiston chegarasidan keyingi xarajatlar. Ekspeditordan 'chegaradan' hisobini so'rang.", "l": "uz"}, {"t": "DDP (Delivered Duty Paid)", "s": "YETKAZIB BERISH SHARTLARI INCOTERMS 2020", "b": "Sotuvchi mutlaqo hammasini o'z zimmasiga oladi: yetkazib berish, bojxona rasmiylashtirish, barcha boj va soliqlarni to'lash. O'zbekistonda kamdan-kam uchraydi.\n⚠️ Ehtiyot bo'ling: DDP da bojxona rasmiylashtirish ustidan nazoratni yo'qotasiz. Tekshiruvda da'volar — qabul qiluvchi sifatida sizga.", "l": "uz"}, {"t": "Valyuta nazorati", "s": "VALYUTA NAZORATI VA BANK", "b": "Davlatning chet el valyutasi harakatini kuzatish tizimi. O'zbekistonda Markaziy bank (cbu.uz) vakolatli tijorat banklari orqali amalga oshiradi. Xorijga har bir to'lov va tushum kuzatiladi va shartnoma bilan solishtiriladi.", "l": "uz"}, {"t": "Repatriatsiya", "s": "VALYUTA NAZORATI VA BANK", "b": "Eksportchining valyuta daromadini belgilangan muddatlarda O'zbekistondagi bank hisobiga qaytarish majburiyati.\n⚠️ Ko'p uchraydigan xato: Chet el xaridoriga bank bilan kelishmasdan uzun to'lovni kechiktirish berish. Repatriatsiya muddatlari belgilangan — ularni buzish shartnoma shartlaridan bog'liq emas.", "l": "uz"}, {"t": "Konvertatsiya", "s": "VALYUTA NAZORATI VA BANK", "b": "Ichki hisob-kitoblar yoki bojxona to'lovlarini to'lash uchun chet el valyutasini so'mga almashtirish. Bojxona to'lovlari deklaratsiya topshirilgan kundagi MB kursi bo'yicha hisoblanadi. Kurs har kuni o'zgaradi.\n📌 Maslahat: Yetkazib berish byudjetini rejalashtirishda kurs farqi uchun kichik zaxira qoldiring.", "l": "uz"}, {"t": "Valyuta sharti", "s": "VALYUTA NAZORATI VA BANK", "b": "Kurs o'zgarishi xavfidan himoya qiluvchi shartnomadagi shart. Kurs o'zgarganda narx qaysi valyutada qayta hisoblanishini belgilaydi. Ogohlantirish yo'q bo'lsa — hamkorlardan biri pul yo'qotadi.", "l": "uz"}, {"t": "DTQ (Davlat Bojxona Qo'mitasi)", "s": "TASHKILOTLAR VA MANBALAR", "b": "O'zbekistonning asosiy bojxona organi. Deklaratsiyalarni qabul qiladi, tovarlar harakatini nazorat qiladi, rasmiylashtirish qoidalarini belgilaydi. Sayt: customs.uz. Tariflar va kodlar: tarif.customs.uz.", "l": "uz"}, {"t": "O'zstandart", "s": "TASHKILOTLAR VA MANBALAR", "b": "O'zbekiston texnik tartibga solish va metrologiya agentligi. Standartlar ishlab chiqadi, sertifikatsiya organlarini va sinash laboratoriyalarini akkreditatsiya qiladi. Sayt: standart.uz.", "l": "uz"}, {"t": "O'ZAKK (O'zbekiston Akkreditatsiya Markazi)", "s": "TASHKILOTLAR VA MANBALAR", "b": "Barcha akkreditatsiyalangan sertifikatsiya organlari va sinash laboratoriyalarining rasmiy rejestrini yuritadi. Sayt: akkred.uz. Murojaat qilishdan oldin holatni tekshiring.\n⚠️ Ko'p uchraydigan xato: Akkreditatsiyani tekshirmasdan organ bilan ishlash. Akkreditatsiya yo'qolsa — sertifikat haqiqiy emas.", "l": "uz"}, {"t": "Yagona darcha (Single Window)", "s": "TASHKILOTLAR VA MANBALAR", "b": "Elektron shaklda ruxsat beruvchi hujjatlar olish uchun davlat portali. Bitta kirish — barcha idoralar. TN VED kodi bo'yicha hujjat kerakligini tekshirish, onlayn ariza, holatni kuzatish — hammasi singlewindow.uz da.", "l": "uz"}, {"t": "Lex.uz", "s": "TASHKILOTLAR VA MANBALAR", "b": "O'zbekiston Respublikasining rasmiy normativ-huquqiy hujjatlar bazasi. Qonunlar, hukumat qarorlari, idora buyruqlari — amaldagi tahririda. Stavka, imtiyoz, talab yoki taqiq bo'yicha har qanday bayonotni tekshirish uchun birlamchi manba.", "l": "uz"}, {"t": "Tarif.customs.uz", "s": "TASHKILOTLAR VA MANBALAR", "b": "Bojxona boji stavkalari, TN VED kodlari va qo'shimcha izohlar bilan DTQning rasmiy portali. Har qanday tovar bilan ishlashda birinchi ochadigan saytingiz. Bepul, dolzarb, rasmiy.\nVED Wiki qonunchilik o'zgarishlariga qarab yangilanib turadi\nInCustom-Helper  ·  incustoms.uz  ·  @incustoms_uz", "l": "uz"}, {"t": "HS code", "s": "HS CODE & GOODS CLASSIFICATION", "b": "A unified classifier of all goods in international trade. Each product is assigned a 10-digit code that determines the duty rate, VAT, excise and the list of required permits.\nHow the code is built: 8471 30 000 0 — the first 4 digits are the heading, then sub-heading, specification and the Uzbekistan-level detail.\n📌 Example: a laptop — code 8471 30 000 0: duty 0%, VAT 12%, conformity certificate required. One wrong digit means recalculated payments and a penalty risk.\n⚠️ Common mistake: taking the supplier's code blindly. The supplier classifies under their own country — codes may differ. Always verify at tarif.customs.uz.", "l": "en"}, {"t": "GIR (General Rules of Interpretation)", "s": "HS CODE & GOODS CLASSIFICATION", "b": "Six rules by which a product's code is officially determined. Applied strictly in order — if rule 1 doesn't give a single answer, you move to rule 2.\nRule 1 — read the heading text and the section/chapter notes\nRule 2 — unfinished articles and mixtures\nRule 3 — if several headings fit: take the more specific one\nRule 4 — by analogy with a similar product\nRule 5 — packaging and cases\nRule 6 — to determine the sub-heading within a heading\n📌 Example: importing an MFP — printer+scanner+copier. Three codes formally fit. GIR rule 3: classify by the main function. It's printing → code by the printer.\n⚠️ Common mistake: classifying «by common sense» without reading the chapter notes. Notes take priority over the heading name.", "l": "en"}, {"t": "Classification ruling", "s": "HS CODE & GOODS CLASSIFICATION", "b": "An official decision by the customs authority assigning a specific HS code to a specific product. Once issued, it is mandatory for all shipments of that product.\nHow to get it: file an application with the State Customs Committee with a product description, technical documentation and samples. The decision is issued within 30 days.\n📌 Example: a medical device — chapter 90 (duty 0%) or chapter 85 (duty 10%)? On a $200,000 batch that's a $20,000 difference. A ruling fixes the code once and for all.\n⚠️ Common mistake: thinking it's slow and complex. One inspection with re-classification costs more than a month spent getting a ruling.", "l": "en"}, {"t": "Customs duty", "s": "CUSTOMS PAYMENTS", "b": "A mandatory payment to the state when importing or exporting goods. The amount depends on the HS code and the country of origin.\nAd valorem — % of customs value. Example: 10% of $10,000 = $1,000\nSpecific — a fixed amount per unit. Example: $2 per kg\nCombined — the higher of the two applies. Example: 15%, but not less than $3 per kg\n📌 Example: steel pipes, duty 10%, batch $50,000 → duty $5,000. But with an ST-1 (Russia, CIS) → rate 0% → duty $0. One document = $5,000 saved.\n⚠️ Common mistake: not checking with the supplier whether a certificate of origin is available. It's a free document that can zero out the duty.", "l": "en"}, {"t": "Customs value", "s": "CUSTOMS PAYMENTS", "b": "The base for calculating all customs payments. Under the main method (method 1) — the transaction price plus delivery and insurance costs up to the Uzbekistan border.\nFormula: Customs value = Goods price (invoice) + Freight to the UZ border + Insurance + Royalties (if any)\nEXW → add freight + insurance from the seller's warehouse to the UZ border\nFOB → add freight + insurance from the port of shipment to the UZ border\nCIF → add nothing, it's already included\nDAP → subtract costs after the UZ border\n📌 Example: goods $10,000 on FOB Shanghai terms. Freight $1,200, insurance $80. Customs value = $11,280. Duty and VAT are calculated from this — not from the $10,000 in the invoice.\n⚠️ Common mistake: declaring only the invoice price and forgetting to add freight. Customs sees it from the transport documents — and assigns a value adjustment (KTS).", "l": "en"}, {"t": "Customs value adjustment (KTS)", "s": "CUSTOMS PAYMENTS", "b": "A customs inspector's decision to increase the declared customs value. It automatically triggers additional duty and VAT — the cargo is not released until the surcharge is paid or security is provided.\nThe invoice price is below the indicative prices in the customs database\nNo documents confirming the price\nSeller and buyer are related parties\nUnusual settlement terms (barter, instalments)\n📌 Example: importing shoes at $8 a pair. The customs indicative is $12. KTS — surcharge based on $12. The cargo sits at the temporary storage warehouse. Correct move: provide security, take the cargo, dispute it with documents.\n⚠️ Common mistake: silently accepting the KTS. It sets a precedent — on the next shipment customs will raise the value again.", "l": "en"}, {"t": "Import VAT", "s": "CUSTOMS PAYMENTS", "b": "Value-added tax on importing goods into Uzbekistan. The rate is 12%. It is charged not on the goods price, but on the whole sum after duty and excise.\nFormula: VAT = (Customs value + Duty + Excise) × 12%\nVAT payers offset it on later sale. Non-VAT payers include it in the cost.\n📌 Example: customs value $11,280, duty $1,128, excise $0. VAT base = $12,408. VAT 12% = $1,489. For most goods VAT is the largest payment on import.\n⚠️ Common mistake: counting only the duty and forgetting VAT. Especially critical for small businesses on a simplified regime.", "l": "en"}, {"t": "Excise", "s": "CUSTOMS PAYMENTS", "b": "An additional tax on certain categories of goods. Charged before VAT and increasing the base for its calculation.\nAlcoholic products\nTobacco and tobacco products, e-cigarettes\nPetroleum products (petrol, diesel, jet fuel)\nPassenger cars (by engine capacity)\nPolyethylene bags\n📌 Example: a car of 2,000 cc: excise is charged per cc, then 12% VAT is charged on (customs value + excise). Not knowing about excise can throw your calculation off several-fold.\n⚠️ Common mistake: when importing cars, counting only duty and VAT. Excise + recycling fee often exceed all the other payments.", "l": "en"}, {"t": "Customs clearance fee", "s": "CUSTOMS PAYMENTS", "b": "A fixed payment for the customs operations on your declaration. It depends on the customs value of the goods. The smallest of all payments, but paid together with duty and VAT.\n⚠️ Common mistake: forgetting to include the fee when budgeting a shipment.", "l": "en"}, {"t": "Recycling fee", "s": "CUSTOMS PAYMENTS", "b": "A payment for vehicles and self-propelled machinery. The state collects it in advance — to fund recycling the machinery at the end of its service life.\nPassenger cars and trucks\nBuses and minibuses\nSpecial machinery: excavators, cranes, loaders\nTrailers and semi-trailers\n⚠️ Common mistake: not accounting for the fee when pricing machinery. Especially painful when importing a fleet.", "l": "en"}, {"t": "Preference", "s": "CUSTOMS PAYMENTS", "b": "A reduced or zero customs duty rate for goods from certain countries under Uzbekistan's international agreements.\nCIS (Russia, Kazakhstan, Belarus, etc.) → ST-1 → rate 0% or reduced\nEU, Japan, Canada → Form A (GSP) → reduced for certain goods\nTurkey → bilateral agreement → check by code\nThe single condition — the original certificate of origin. A copy doesn't work.\n📌 Example: rolled metal from Russia, duty 10%, batch $100,000. Ask for an ST-1 → duty 0%. $10,000 saved on one shipment.\n⚠️ Common mistake: getting the certificate but not claiming the preference in the declaration. Or forgetting to ask the supplier for an ST-1 — after clearance the duty can't be refunded.", "l": "en"}, {"t": "Customs declaration (GTD)", "s": "CUSTOMS PROCEDURES & REGIMES", "b": "The main customs clearance document. You officially tell customs: what you're carrying, from where, at what price, under which regime and how much you've paid. In Uzbekistan it is filed electronically via the «Deklarant» system (Gold Soft).\n📌 In practice: the declaration is prepared by a customs broker. A correctly filled one is your protection against any claim. An error in the declaration = a fine or a delayed cargo.\n⚠️ Common mistake: filing the declaration at the last moment, when the cargo is already at the storage warehouse. Storage costs money. Prepare documents before the cargo arrives.", "l": "en"}, {"t": "IM 40 — Release for domestic use", "s": "CUSTOMS PROCEDURES & REGIMES", "b": "The main regime on import. You bring in the goods, pay all customs payments — and the goods become fully yours. You can sell, use or process them without restrictions. 90% of all imports into Uzbekistan are cleared under IM 40.", "l": "en"}, {"t": "EK 10 — Export", "s": "CUSTOMS PROCEDURES & REGIMES", "b": "A regime for taking goods out of Uzbekistan with an obligation not to bring them back. On export VAT = 0% (zero rate, not exemption) — you can reclaim input VAT.\n⚠️ Common mistake: confusing the zero VAT rate with VAT exemption. With the zero rate you keep the right to deduct input VAT. With exemption — you don't.", "l": "en"}, {"t": "IM 70 — Customs warehouse", "s": "CUSTOMS PROCEDURES & REGIMES", "b": "You bring goods into Uzbekistan but don't pay duty and VAT yet. The goods are stored at a special warehouse under customs control. Payments — only when you decide to release the goods for sale or take them out.\n⚠️ Common mistake: thinking it's free. Storage at a customs warehouse costs money. Weigh the savings on payments against the storage cost.", "l": "en"}, {"t": "IM 74 — Inward processing", "s": "CUSTOMS PROCEDURES & REGIMES", "b": "You import raw materials or components for production — paying no duty and VAT. You process them. The finished product is exported back. A regime for manufacturers working for export.\n⚠️ Common mistake: breaching the processing or export deadlines. If the goods aren't exported in time — payments are charged automatically, plus fines.", "l": "en"}, {"t": "ND 40 — Temporary import", "s": "CUSTOMS PROCEDURES & REGIMES", "b": "You import goods for a limited time — with an obligation to take them back out. You either pay no duty and VAT at all, or pay partially. For exhibition equipment, professional filming gear, corporate transport.\n⚠️ Common mistake: forgetting the deadline and not taking the goods out in time. A breach means payments + a fine.", "l": "en"}, {"t": "Transit (TT 10)", "s": "CUSTOMS PROCEDURES & REGIMES", "b": "Goods travel through Uzbekistan from one country to another. No payments are charged — the goods move under customs control from entry to exit. Uzbekistan is an important transit corridor between Russia/CIS and Afghanistan, China and Europe.", "l": "en"}, {"t": "Temporary storage warehouse (SVH)", "s": "CUSTOMS PROCEDURES & REGIMES", "b": "The place where cargo waits while you prepare the customs declaration. Goods go there right after arriving in the country. Maximum storage period — 2 months. Storage is paid — per day and per tonne.\n📌 Example: the cargo arrived Friday evening. Documents aren't ready. You'll file the declaration on Monday. Three days at the warehouse — that's money. Prepare documents before the cargo arrives.\n⚠️ Common mistake: treating the warehouse as a «free pause». It's one of the most common unnecessary import costs.", "l": "en"}, {"t": "Conditional release", "s": "CUSTOMS PROCEDURES & REGIMES", "b": "Cargo is released before all checks are completed. You provide security — cash or a bank guarantee for the amount of the disputed payments.\n📌 In practice: customs assigned a value adjustment (KTS), but you need the cargo urgently. Provide security → take the goods → keep disputing the KTS. If you win — the security is returned.\n⚠️ Common mistake: not knowing about this tool and keeping the cargo at the warehouse for the whole dispute.", "l": "en"}, {"t": "Customs inspection", "s": "CUSTOMS PROCEDURES & REGIMES", "b": "A physical check of the goods by an inspector. They open the packaging, recount, weigh, and compare against the declaration. It can be primary, repeat or identification.\n📌 In practice: an inspection is not a punishment. It's a tool of the risk management system. Any company can be selected. The key: the accompanying documents must exactly match the actual cargo.\n⚠️ Common mistake: panicking during an inspection and trying to «settle it» informally. If your documents are in order — the inspection passes without consequences.", "l": "en"}, {"t": "Risk management system (SUR)", "s": "CUSTOMS PROCEDURES & REGIMES", "b": "The customs' automated system. It analyses every declaration and decides: release without a check (green), check the documents (yellow), or assign an inspection (red).\n🟢 Green channel — auto-release without a check\n🟡 Yellow channel — documentary check\n🔴 Red channel — physical inspection\n📌 In practice: ending up in the red channel doesn't mean you broke a rule. It's statistics and algorithms. The longer you work cleanly — the more often you get green.", "l": "en"}, {"t": "Invoice", "s": "DOCUMENTS", "b": "The main transaction document from seller to buyer. It contains the product name, quantity, price, delivery terms and the parties' details. The primary document for calculating customs value.\nMust be in the invoice: HS code, quantity, net/gross weight, unit price, currency, Incoterms, country of origin, parties' details, contract number and date.\n⚠️ Common mistake: accepting an invoice in any form «as long as it has a price». A badly drawn-up invoice is the main cause of delays and value adjustments.", "l": "en"}, {"t": "Packing list", "s": "DOCUMENTS", "b": "A detailed list of the contents of each cargo unit: what, how much, in which packaging, and the weight of each unit. Without it, customs can't tell what's in each box — the inspection risk automatically rises.\n⚠️ Common mistake: sending one general list instead of a breakdown by unit. During an inspection the officer must see the contents of each specific box.", "l": "en"}, {"t": "CMR", "s": "DOCUMENTS", "b": "A consignment note for road transport. An international standard — valid in all countries that signed the CMR Convention. Contains: sender, recipient, route, cargo description, transport terms. Most cargo to Uzbekistan travels by road.", "l": "en"}, {"t": "TIR (TIR carnet)", "s": "DOCUMENTS", "b": "An international customs transit system for road transport. The TIR carnet is a guarantee that customs payments are covered in every country along the route. Without it — separate customs clearance in each transit country.\n📌 In practice: most trucks from Europe and Turkey travel to Uzbekistan under TIR. The carnet is opened in the country of departure and closed in Uzbekistan.\n⚠️ Common mistake: confusing TIR and CMR. CMR is the carriage contract. TIR is the customs transit document. They travel together, but they are different things.", "l": "en"}, {"t": "Bill of Lading (B/L)", "s": "DOCUMENTS", "b": "A transport document for sea carriage. It is at once: the carriage contract, the captain's receipt, and a document of title (whoever holds it owns the cargo).\n⚠️ Common mistake: not controlling whom the bill of lading is issued to. If it's to the freight forwarder — there may be problems collecting the cargo.", "l": "en"}, {"t": "Air Waybill (AWB)", "s": "DOCUMENTS", "b": "A transport document for air carriage. Unlike a bill of lading — it is not a document of title. Used for urgent, high-value or perishable cargo.", "l": "en"}, {"t": "Rail waybill (SMGS/CIM)", "s": "DOCUMENTS", "b": "A transport document for rail carriage. SMGS — for CIS countries, CIM — for European ones. The main way to deliver large batches from Russia, Kazakhstan, China.", "l": "en"}, {"t": "Export declaration of the country of departure", "s": "DOCUMENTS", "b": "A document with which the foreign seller cleared the export of the goods in their own country. It confirms: the goods legally left the country at the declared price.\n📌 In practice: Uzbek customs requests it during a value adjustment. If the price at export matches your invoice — a strong argument against the KTS.\n⚠️ Common mistake: not asking the supplier in advance. After shipment it's harder to obtain.", "l": "en"}, {"t": "Insurance policy (cargo)", "s": "DOCUMENTS", "b": "A document confirming the cargo is insured during carriage. It covers the risks of loss, damage and theft.\nUnder CIF the seller must insure the cargo — but with minimum cover (ICC C, 110% of value). If you want full cover — specify ICC A in the contract. Under EXW, FOB — you insure the cargo yourself. The insurance premium is included in the customs value.", "l": "en"}, {"t": "Certificate of origin", "s": "DOCUMENTS", "b": "A document confirming the country of origin of the goods. It gives the right to a preferential duty rate.\nST-1 → CIS countries → duty 0% or reduced\nEUR.1 → goods from the EU → reduced for certain groups\nForm A → GSP (developing countries) → reduced\nCO (Certificate of Origin) → universal, no preferences\n⚠️ Common mistake: requesting the certificate after shipment. Some types (e.g. ST-1) are issued only before or during shipment.", "l": "en"}, {"t": "ST-1", "s": "DOCUMENTS", "b": "A certificate of origin for goods from CIS countries. Gives the right to a zero or reduced duty rate. Issued by the Chamber of Commerce of the exporting country.\nCountries: Russia, Kazakhstan, Belarus, Kyrgyzstan, Tajikistan, Armenia, Azerbaijan, Moldova, Ukraine.", "l": "en"}, {"t": "Contract (foreign trade)", "s": "DOCUMENTS", "b": "The main legal document between you and your foreign partner.\nFull details of the parties\nProduct description (name, HS code, quantity, quality)\nPrice and currency\nDelivery terms (Incoterms)\nPayment terms (prepayment, letter of credit, deferral)\nWho arranges the permits\nGoverning law and dispute resolution\n⚠️ Common mistake: not stating who arranges the certificate of origin and the permits. Later it turns out nobody did.", "l": "en"}, {"t": "Contract specification", "s": "DOCUMENTS", "b": "An annex to the contract with a detailed description of each batch: names, article numbers, quantities, per-line prices. An integral part of the contract. For regular shipments it's more convenient to have a framework contract + a specification for each batch.", "l": "en"}, {"t": "Quality certificate", "s": "DOCUMENTS", "b": "A document from the manufacturer or an independent lab confirming the quality characteristics of a specific batch.\n📌 Important: don't confuse it with a conformity certificate. A quality certificate is from the manufacturer, for a batch. A conformity certificate is from an accredited body, for compliance with
