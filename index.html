 a technical regulation.", "l": "en"}, {"t": "Technical passport / Manual", "s": "DOCUMENTS", "b": "The manufacturer's documentation for machinery and equipment. Mandatory when importing equipment, electronics, medical devices. Must be in Russian or Uzbek — or with a notarised translation.", "l": "en"}, {"t": "Acceptance act", "s": "DOCUMENTS", "b": "A document recording the actual handover of goods from seller to buyer: date, place, condition, quantity. A signed act is proof that the goods were accepted in proper condition.\n⚠️ Common mistake: the absence of an act makes it harder to claim against the carrier or seller for shortage or damage.", "l": "en"}, {"t": "Deal passport", "s": "DOCUMENTS", "b": "Registration of a foreign-trade contract with an authorised bank. Required when the contract amount exceeds a set threshold. Without a deal passport the bank won't process a payment abroad.\n⚠️ Common mistake: paying a foreign supplier before opening a deal passport. The bank will block the payment.", "l": "en"}, {"t": "Conformity certificate", "s": "PERMITS & REQUIRED DOCUMENTS", "b": "Confirmation that the goods comply with Uzbekistan's standards and technical requirements. Issued by an accredited body after lab testing. Without it customs won't release the goods.\n⚠️ Common mistake: starting the certificate when the cargo is already at the warehouse. Order the certificate at the same time as shipment.", "l": "en"}, {"t": "Scheme 7A", "s": "PERMITS & REQUIRED DOCUMENTS", "b": "The most common certification scheme for importers. The certificate is issued for a specific contract, valid for 1 year. One certificate covers all shipments under that contract within the year.\nWhat's needed: HS code and product description, contract and invoice, technical documentation, samples for testing.", "l": "en"}, {"t": "Hygiene certificate", "s": "PERMITS & REQUIRED DOCUMENTS", "b": "Permission from the sanitary authorities to import goods that contact people or the environment. Authority: State Sanitary-Epidemiological Service (sanepid.uz).\nCosmetics and perfume\nTableware and kitchenware\nChildren's goods and toys\nFood, dietary supplements\nHousehold chemicals and cleaning agents\n⚠️ In practice: often required together with a conformity certificate. Check by HS code in advance.", "l": "en"}, {"t": "Veterinary certificate", "s": "PERMITS & REQUIRED DOCUMENTS", "b": "Permission from the veterinary service to import animals and products of animal origin. Authority: State Veterinary Service (vetgov.uz). The exporting country's veterinary certificate is mandatory — without it the cargo is turned back at the border.\nLive animals and poultry\nMeat and meat products\nFish and seafood\nMilk and dairy\nAnimal feed, hides, wool", "l": "en"}, {"t": "Phytosanitary certificate", "s": "PERMITS & REQUIRED DOCUMENTS", "b": "Permission from the quarantine service to import plants and plant products. Authority: State Quarantine Inspection (karantin.uz). At the slightest sign of quarantine pests the cargo can be detained or destroyed.\nFresh fruit and vegetables\nSeeds and planting material\nGrain and its processing products\nCut flowers, plant raw materials", "l": "en"}, {"t": "Registration certificate (RU)", "s": "PERMITS & REQUIRED DOCUMENTS", "b": "A special permit to import medicines and medical devices. Without an RU, customs won't release medical equipment and medicines. Time to obtain — several months. Authority: Agency for the Development of the Pharmaceutical Industry (miit.uz).\n⚠️ Common mistake: importing a medical device without an RU, planning to «sort it out later». The cargo will be seized at customs.", "l": "en"}, {"t": "Import/export license", "s": "PERMITS & REQUIRED DOCUMENTS", "b": "A special state permit to import or export certain categories of goods. Without a license — not only will customs not release it, criminal liability is also possible. Check the list on lex.uz before signing the contract.\nImport: weapons, narcotics, dual-use goods, precious metals\nExport: strategic raw materials, antiques and cultural valuables", "l": "en"}, {"t": "Incoterms 2020", "s": "DELIVERY TERMS — INCOTERMS 2020", "b": "ICC's international rules answering three questions in any trade deal: who pays for delivery and up to which point, who bears the risk of loss or damage, who arranges documents and permits.\nFor customs: the delivery term determines the customs value. Uzbek customs calculates on a CIF basis. If the contract uses another term — it must be recalculated to CIF.", "l": "en"}, {"t": "EXW (Ex Works)", "s": "DELIVERY TERMS — INCOTERMS 2020", "b": "The seller did the minimum: prepared the goods at their own warehouse. Everything else is your concern. Your costs: loading + inland transport in the seller's country + export clearance + international carriage + insurance + delivery to your warehouse.\n📌 For customs: customs value under EXW = invoice price + ALL costs up to the UZ border.", "l": "en"}, {"t": "FOB (Free On Board)", "s": "DELIVERY TERMS — INCOTERMS 2020", "b": "The seller delivers the goods to the ship's side at the port of shipment and loads them. After loading — the risk is yours. Sea carriage only.\n📌 For customs: customs value under FOB = FOB price + freight to the UZ border + insurance. Don't forget to add freight — a common cause of value adjustments.", "l": "en"}, {"t": "CIF (Cost, Insurance, Freight)", "s": "DELIVERY TERMS — INCOTERMS 2020", "b": "The seller pays freight and insurance to the port of destination. CIF is the base term for calculating customs value in Uzbekistan. All other terms are recalculated to it.\n⚠️ In practice: under CIF the seller chooses the insurance — minimum cover by default (ICC C). If you want full cover — specify ICC A in the contract.", "l": "en"}, {"t": "DAP (Delivered At Place)", "s": "DELIVERY TERMS — INCOTERMS 2020", "b": "The seller delivers the goods to your warehouse in Uzbekistan. Customs clearance and payments are your task.\n📌 For customs: customs value under DAP = DAP price minus costs after the UZ border. Ask the forwarder for a «from the border» breakdown.", "l": "en"}, {"t": "DDP (Delivered Duty Paid)", "s": "DELIVERY TERMS — INCOTERMS 2020", "b": "The seller takes on absolutely everything: delivery, customs clearance, payment of all duties and taxes in your country. Rare in Uzbekistan.\n⚠️ Caution: under DDP you lose control over customs clearance. In a check, claims go to you as the recipient.", "l": "en"}, {"t": "Currency control", "s": "CURRENCY CONTROL & BANKING", "b": "The state's system for monitoring the movement of foreign currency. In Uzbekistan it is run by the Central Bank (cbu.uz) through authorised commercial banks. Every payment abroad and every inflow is tracked and reconciled against the contract.", "l": "en"}, {"t": "Repatriation of export proceeds", "s": "CURRENCY CONTROL & BANKING", "b": "The exporter's obligation to return foreign-currency proceeds to an account at an Uzbek bank within set deadlines.\n⚠️ Common mistake: giving a foreign buyer a long deferral without agreeing it with the bank. Repatriation deadlines are fixed — breaching them doesn't depend on the contract terms.", "l": "en"}, {"t": "Currency conversion", "s": "CURRENCY CONTROL & BANKING", "b": "Exchanging foreign currency into Uzbek sum for domestic settlements or to pay customs payments. Customs payments are paid in sum at the Central Bank rate on the declaration date. The rate changes daily.\n📌 Tip: when budgeting a shipment, allow a small reserve for the exchange-rate difference.", "l": "en"}, {"t": "Currency clause", "s": "CURRENCY CONTROL & BANKING", "b": "A contract clause protecting against exchange-rate risk. It fixes the currency in which the price is recalculated if the rate changes. Without a clause, one of the partners loses money when the rate moves.", "l": "en"}, {"t": "State Customs Committee (GTK)", "s": "ORGANIZATIONS & SOURCES", "b": "Uzbekistan's main customs authority. It accepts declarations, controls the movement of goods, and sets clearance rules. Website: customs.uz. Tariffs and codes: tarif.customs.uz.", "l": "en"}, {"t": "O'zstandart", "s": "ORGANIZATIONS & SOURCES", "b": "The Agency for Technical Regulation and Metrology. It develops standards and accredits certification bodies and testing labs. Website: standart.uz.", "l": "en"}, {"t": "O'ZAKK (accreditation centre)", "s": "ORGANIZATIONS & SOURCES", "b": "Maintains the official register of all accredited certification bodies and testing labs. Website: akkred.uz. Before approaching a body — always check its accreditation status.\n⚠️ Common mistake: working with a body without checking accreditation. If the body lost accreditation — the certificate it issued is invalid.", "l": "en"}, {"t": "Single Window", "s": "ORGANIZATIONS & SOURCES", "b": "A government portal for obtaining permits electronically. One entry — all agencies. Check whether a document is needed by HS code, file an application online, track the status — all at singlewindow.uz.", "l": "en"}, {"t": "Lex.uz", "s": "ORGANIZATIONS & SOURCES", "b": "The official database of legal acts of the Republic of Uzbekistan. Laws, government resolutions, agency orders — all in their current versions. The primary source for checking rates, exemptions, requirements and bans.", "l": "en"}, {"t": "Tarif.customs.uz", "s": "ORGANIZATIONS & SOURCES", "b": "The official SCC portal with customs duty rates, HS codes and additional notes. The first site you open when working with any product. Free, up-to-date, official.", "l": "en"}];

// вкладки
function showTab(p){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.pane').forEach(x=>x.classList.remove('on'));
  const t=document.querySelector('.tab[data-p="'+p+'"]'); const pane=document.getElementById('p'+p);
  if(t&&pane){t.classList.add('on');pane.classList.add('on');}
}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>showTab(t.dataset.p));
const _it=params.get('tab'); if(['calc','code','perm','wiki'].includes(_it)) showTab(_it);

const fmt=n=>Math.round(n).toLocaleString('ru-RU').replace(/,/g,' ');
const debounce=(f,ms)=>{let h;return(...a)=>{clearTimeout(h);h=setTimeout(()=>f(...a),ms)}};
async function api(path){const r=await fetch(API+path);return r.json()}

// ---- РАСЧЁТ ----
let pickedCode=null;
const csug=debounce(async()=>{
  const q=c_q.value.trim();
  if(/^\d[\d\s]{3,}$/.test(q)){pickedCode=q.replace(/\s/g,'');c_sug.style.display='none';return}
  if(q.length<2){c_sug.style.display='none';return}
  const d=await api('/api/search?q='+encodeURIComponent(q));
  c_sug.innerHTML=d.items.slice(0,6).map(i=>`<div data-c="${i.code}">${i.code} — ${(i.name||'').slice(0,60)}</div>`).join('');
  c_sug.style.display=d.items.length?'block':'none';
  c_sug.querySelectorAll('div').forEach(el=>el.onclick=()=>{
    pickedCode=el.dataset.c; c_q.value=el.dataset.c; c_picked.textContent='Код: '+el.dataset.c;
    c_sug.style.display='none';
  });
},250);
c_q.oninput=csug;
c_go.onclick=async()=>{
  const code=pickedCode||c_q.value.replace(/\s/g,'');
  const price=parseFloat(c_price.value);
  if(!/^\d{4,}$/.test(code)||!price){c_out.innerHTML='<div class="empty">'+L.need+'</div>';return}
  c_out.innerHTML='<div class="empty">…</div>';
  const r=await fetch(API+'/api/calc',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({code,price_usd:price,qty:parseFloat(c_qty.value)||0,has_certificate:c_cert.checked,
      lang,initData:(tg&&tg.initData)||''})});
  const d=await r.json();
  if(d.gated){
    c_disc.textContent='';
    c_out.innerHTML='<div class="card">'+(d.message||'')+
      '<button class="go" id="c_pay" style="margin-top:12px">'+L.tochat+'</button></div>';
    const pb=document.getElementById('c_pay'); if(pb) pb.onclick=()=>{ if(tg) tg.close(); };
    return;
  }
  const res=(d.result&&d.result.result_sum)||{};
  let h='<div class="card">';
  if(d.name) h+='<div class="hint">'+d.name.slice(0,80)+'</div>';
  for(const[k,v] of Object.entries(res)){
    if(k.startsWith('ИТОГО')) continue;
    if((k==='Акциз'||k.startsWith('Дополнительная'))&&!v) continue;
    h+=`<div class="line"><span>${k}</span><b>${fmt(v)} сум</b></div>`;
  }
  if(res['ИТОГО платежей']!==undefined)
    h+=`<div class="line total"><span>${L.total}</span><b>${fmt(res['ИТОГО платежей'])} сум</b></div>`;
  h+=`<div class="hint">${L.rate}: ${fmt(d.rate_cbu)} · ${d.duty_label||''}</div></div>`;
  c_out.innerHTML=h; c_disc.textContent=L.disc;
};

// ---- КОД ----
k_q.oninput=debounce(async()=>{
  const q=k_q.value.trim(); if(q.length<2){k_list.innerHTML='';k_cnt.textContent='';return}
  const d=await api('/api/search?q='+encodeURIComponent(q));
  k_cnt.textContent=d.items.length?d.items.length+'':L.empty;
  k_list.innerHTML=d.items.map((i,idx)=>
    `<div class="item"><div class="term" data-i="${idx}"><span><span class="code">${i.code}</span> <span class="name">${(i.name||'').slice(0,70)}</span></span><span class="arrow">›</span></div><div class="body" id="kb${idx}"></div></div>`
  ).join('');
  k_list.querySelectorAll('.term').forEach(t=>t.onclick=async()=>{
    const it=t.closest('.item'); it.classList.toggle('open');
    const bd=it.querySelector('.body');
    if(it.classList.contains('open')&&!bd.dataset.done){
      bd.dataset.done='1'; bd.textContent='…';
      const code=d.items[t.dataset.i].code;
      const rd=await api('/api/rates?code='+code);
      const du=(rd.rates&&rd.rates.duty)||{};
      bd.innerHTML=`<div class="line"><span>Пошлина</span><b>${du.label||(du.advalorem_pct??'—')+'%'}</b></div>`+
        `<div class="line"><span>НДС</span><b>${rd.rates&&rd.rates.vat_exempt?'освобождён':((rd.rates&&rd.rates.vat_pct)||12)+'%'}</b></div>`+
        `<div class="hint">Ориентировочно. Точно — в чате бота.</div>`;
    }
  });
},250);

// ---- РАЗРЕШИТЕЛЬНЫЕ ----
const esc=s=>(s||'').replace(/</g,'&lt;');
async function permLoad(code){
  p_out.innerHTML='<div class="empty">…</div>';
  const d=await api('/api/permits?code='+encodeURIComponent(code));
  let h='<div class="card">';
  if(d.name) h+='<div class="hint">'+esc(d.name).slice(0,90)+'</div>';
  // Подтверждение соответствия
  h+='<div class="line"><span>'+L.conf_t+'</span><b>'+
     (d.conformity ? (d.conformity.form_key==='cert'?L.form_cert:d.conformity.form_key==='declaration'?L.form_decl:esc(d.conformity.form_ru))
                   : '—')+'</b></div>';
  if(!d.conformity) h+='<div class="hint">'+L.no_conf+'</div>';
  // Сан-эпид
  if(d.sanitary) h+='<div class="line"><span>'+L.sanit_t+'</span><b>✔</b></div>';
  // Маркировка
  if(d.marking) h+='<div class="line"><span>'+L.mark_t+'</span><b>'+esc(d.marking.requirement||'✔')+
     '</b></div><div class="hint">'+esc(d.marking.npa||'')+(d.marking.since?' · '+esc(d.marking.since):'')+'</div>';
  // Доп. требования из актов
  if(d.requirements&&d.requirements.length){
    h+='<div class="line total" style="font-size:15px"><span>'+L.req_t+'</span><span></span></div>';
    d.requirements.forEach(r=>{ h+='<div class="line"><span>'+esc(r.permit)+'</span><b class="sec">'+esc(r.npa)+'</b></div>'; });
  }
  if(!d.found) h+='<div class="hint">'+L.not_found+'</div>';
  h+='</div>';
  h+='<div class="hint">'+L.perm_cav+'</div>';
  h+='<div class="hint">'+L.src+': '+esc(d.source||'')+'</div>';
  p_out.innerHTML=h;
}
let pPicked=null;
const psug=debounce(async()=>{
  const q=p_q.value.trim();
  if(/^\d[\d\s]{3,}$/.test(q)){pPicked=q.replace(/\s/g,'');p_sug.style.display='none';permLoad(pPicked);return}
  if(q.length<2){p_sug.style.display='none';return}
  const d=await api('/api/search?q='+encodeURIComponent(q));
  p_sug.innerHTML=d.items.slice(0,6).map(i=>`<div data-c="${i.code}">${i.code} — ${esc(i.name).slice(0,60)}</div>`).join('');
  p_sug.style.display=d.items.length?'block':'none';
  p_sug.querySelectorAll('div').forEach(el=>el.onclick=()=>{
    pPicked=el.dataset.c; p_q.value=el.dataset.c; p_picked.textContent='Код: '+el.dataset.c;
    p_sug.style.display='none'; permLoad(pPicked);
  });
},250);
p_q.oninput=psug;

// ---- ВИКИ ----
const witems=WIKI.filter(d=>d.l===lang);
const wnorm=s=>(s||'').toLowerCase().replace(/[^0-9a-zа-яёʻ' ]/g,'');
function wrender(q){
  const nq=wnorm(q);
  const list=nq?witems.filter(d=>wnorm(d.t).includes(nq)||wnorm(d.b).includes(nq)):witems;
  w_cnt.textContent=L.terms(list.length);
  if(!list.length){w_list.innerHTML='<div class="empty">'+L.empty+'</div>';return}
  w_list.innerHTML=list.map((d,i)=>
    `<div class="item"><div class="term" data-i="${i}"><span>${d.t} <span class="sec">${d.s||''}</span></span><span class="arrow">›</span></div><div class="body">${(d.b||'').replace(/</g,'&lt;')}</div></div>`
  ).join('');
  w_list.querySelectorAll('.term').forEach(t=>t.onclick=()=>t.closest('.item').classList.toggle('open'));
}
w_q.oninput=()=>wrender(w_q.value);
wrender('');
