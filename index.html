<script>
  const DATA = [{"t": "ТН ВЭД", "s": "ТН ВЭД И КЛАССИФИКАЦИЯ ТОВАРОВ", "b": "Единый классификатор всех товаров в международной торговле. Каждому товару присваивается 10-значный код — он определяет ставку пошлины, НДС, акциза и список разрешительных документов.\nКак устроен код: 8471 30 000 0 — первые 4 цифры это группа, далее подгруппа, уточнение и детализация Узбекистана.\n📌 Пример: Нoutбук — код 8471 30 000 0: пошлина 0%, НДС 12%, нужен сертификат соответствия. Один неверный знак в коде — пересчёт платежей и риск штрафа.\n⚠️ Частая ошибка: Брать код у поставщика не глядя. Поставщик классифицирует по своей стране — коды могут не совпадать. Всегда проверяйте на tariff.customs.uz.", "u": "https://telegra.ph/TN-VEHD-06-18", "l": "ru"}, {"t": "ОПИ (Основные правила интерпретации ТН ВЭД)", "s": "ТН ВЭД И КЛАССИФИКАЦИЯ ТОВАРОВ", "b": "Шесть правил, по которым официально определяется код товара. Применяются строго по порядку — если правило 1 не даёт однозначного ответа, переходят к правилу 2.\nПравило 1 — читаем текст товарной позиции и примечания к разделам/группам\nПравило 2 — незавершённые изделия и смеси\nПравило 3 — если подходит несколько позиций: берём более конкретную\nПравило 4 — по аналогии с похожим товаром\nПравило 5 — упаковка и футляры\nПравило 6 — для определения субпозиции внутри позиции\n📌 Пример: Ввозите МФУ — принтер+сканер+копир. Формально подходит три кода. ОПИ правило 3: берём по основной функции. Основная — печать → код по принтеру.\n⚠️ Частая ошибка: Классифицировать «по здравому смыслу», не читая примечания к группе. Примечания имеют приоритет над названием позиции.", "u": "https://telegra.ph/OPI-Osnovnye-pravila-interpretacii-TN-VEHD-06-18", "l": "ru"}, {"t": "Классификационное решение", "s": "ТН ВЭД И КЛАССИФИКАЦИЯ ТОВАРОВ", "b": "Официальное решение таможенного органа о присвоении конкретного кода ТН ВЭД конкретному товару. После вынесения — обязательно к применению при всех поставках этого товара.\nКак получить: подаёте заявление в ГТК с описанием товара, техдокументацией и образцами. ГТК выносит решение в течение 30 дней.\n📌 Пример: Медицинский прибор: группа 90 (пошлина 0%) или группа 85 (пошлина 10%)? На партии $200 000 разница $20 000. Классификационное решение фиксирует код раз и навсегда.\n⚠️ Частая ошибка: Думать что это долго и сложно. Один досмотр с переклассификацией обходится дороже, чем месяц на получение решения.", "u": "https://telegra.ph/Klassifikacionnoe-reshenie-06-18", "l": "ru"}, {"t": "Таможенная пошлина", "s": "ТАМОЖЕННЫЕ ПЛАТЕЖИ", "b": "Обязательный платёж государству при ввозе или вывозе товара. Размер зависит от кода ТН ВЭД и страны происхождения.\nАдвалорная — % от таможенной стоимости. Пример: 10% от $10 000 = $1 000\nСпецифическая — фиксированная сумма за единицу. Пример: $2 за кг\nКомбинированная — берётся бо́льшая из двух. Пример: 15%, но не менее $3 за кг\n📌 Пример: Стальные трубы, пошлина 10%, партия $50 000 → пошлина $5 000. Но есть СТ-1 (Россия, СНГ) → ставка 0% → пошлина $0. Один документ = экономия $5 000.\n⚠️ Частая ошибка: Не уточнять наличие сертификата происхождения у поставщика. Это бесплатный документ, который может обнулить пошлину.", "u": "https://telegra.ph/Tamozhennaya-poshlina-06-18", "l": "ru"}, {"t": "Таможенная стоимость", "s": "ТАМОЖЕННЫЕ ПЛАТЕЖИ", "b": "База для расчёта всех таможенных платежей. По основному методу (метод 1) — цена сделки плюс расходы на доставку и страховку до границы Узбекистана.\nФормула: Таможенная стоимость = Цена товара (инвойс) + Фрахт до границы УЗ + Страховка + Лицензионные платежи (если есть)\nEXW → добавить фрахт + страховку от склада продавца до границы УЗ\nFOB → добавить фрахт + страховку от порта отгрузки до границы УЗ\nCIF → ничего не добавлять, уже включено\nDAP → вычесть расходы после границы УЗ\n📌 Пример: Товар $10 000 на условиях FOB Шанхай. Фрахт $1 200, страховка $80. Таможенная стоимость = $11 280. От неё считается пошлина и НДС — а не от $10 000 в инвойсе.\n⚠️ Частая ошибка: Указывать в декларации только цену инвойса, забывая добавить фрахт. Таможня видит это по транспортным документам — и назначает КТС.", "u": "https://telegra.ph/Tamozhennaya-stoimost-06-18", "l": "ru"}, {"t": "КТС (Корректировка таможенной стоимости)", "s": "ТАМОЖЕННЫЕ ПЛАТЕЖИ", "b": "Решение таможенного инспектора об увеличении заявленной таможенной стоимости. Автоматически влечёт доначисление пошлины и НДС — груз не выпускается до доплаты или внесения обеспечения.\nЦена в инвойсе ниже индикативных цен в базе таможни\nНет документов, подтверждающих цену\nВзаимозависимые продавец и покупатель\nНетипичные условия расчёта (бартер, рассрочка)\n📌 Пример: Ввозите обувь по $8 за пару. В базе таможни индикатив $12. КТС — доначисление с $12. Груз стоит на СВХ. Правильно: внести обеспечение, забрать груз, оспорить с документами.\n⚠️ Частая ошибка: Соглашаться с КТС молча. Это создаёт прецедент — на следующей поставке таможня снова поднимет стоимость.", "u": "https://telegra.ph/KTS-Korrektirovka-tamozhennoj-stoimosti-06-18", "l": "ru"}, {"t": "НДС при импорте", "s": "ТАМОЖЕННЫЕ ПЛАТЕЖИ", "b": "Налог на добавленную стоимость при ввозе товара в Узбекистан. Ставка — 12%. Начисляется не на цену товара, а на всю сумму после пошлины и акциза.\nФормула: НДС = (Таможенная стоимость + Пошлина + Акциз) × 12%\nПлательщики НДС берут его в зачёт при дальнейшей реализации. Неплательщики НДС включают в себестоимость.\n📌 Пример: ТС $11 280, пошлина $1 128, акциз $0. База для НДС = $12 408. НДС 12% = $1 489. Для большинства товаров НДС — самый крупный платёж при импорте.\n⚠️ Частая ошибка: Считать только пошлину и забывать про НДС. Особенно критично для малого бизнеса на упрощёнке.", "u": "https://telegra.ph/NDS-pri-importe-06-18", "l": "ru"}, {"t": "Акциз", "s": "ТАМОЖЕННЫЕ ПЛАТЕЖИ", "b": "Дополнительный налог на отдельные категории товаров. Начисляется до НДС и увеличивает базу для его расчёта.\nАлкогольная продукция\nТабак и табачные изделия, электронные сигареты\nНефтепродукты (бензин, дизель, авиакеросин)\nЛегковые автомобили (по объёму двигателя)\nПолиэтиленовые пакеты\n📌 Пример: Автомобиль 2 000 куб.см: акциз считается за каждый куб.см, затем на (ТС + акциз) начисляется НДС 12%. Не зная про акциз, можно ошибиться в расчётах в разы.\n⚠️ Частая ошибка: При импорте автомобилей считать только пошлину и НДС. Акциз + утильсбор нередко превышают все остальные платежи.", "u": "https://telegra.ph/Akciz-06-18", "l": "ru"}, {"t": "Таможенный сбор за оформление", "s": "ТАМОЖЕННЫЕ ПЛАТЕЖИ", "b": "Фиксированный платёж за совершение таможенных операций по вашей декларации. Зависит от таможенной стоимости товара. Самый небольшой из всех платежей, но уплачивается вместе с пошлиной и НДС.\n⚠️ Частая ошибка: Забыть включить сбор в расчёт при планировании бюджета поставки.", "u": "https://telegra.ph/Tamozhennyj-sbor-za-oformlenie-06-18", "l": "ru"}, {"t": "Утилизационный сбор", "s": "ТАМОЖЕННЫЕ ПЛАТЕЖИ", "b": "Платёж за транспортные средства и самоходную технику. Государство берёт авансом — чтобы обеспечить утилизацию техники по окончании срока службы.\nЛегковые и грузовые автомобили\nАвтобусы и микроавтобусы\nСпецтехника: экскаваторы, краны, погрузчики\nПрицепы и полуприцепы\n⚠️ Частая ошибка: Не учитывать сбор при расчёте стоимости техники. Особенно болезненно при импорте автопарка.", "u": "https://telegra.ph/Utilizacionnyj-sbor-06-18", "l": "ru"}, {"t": "Преференция", "s": "ТАМОЖЕННЫЕ ПЛАТЕЖИ", "b": "Сниженная или нулевая ставка таможенной пошлины для товаров из определённых стран на основании международных соглашений Узбекистана.\nСНГ (Россия, Казахстан, Беларусь и др.) → СТ-1 → ставка 0% или снижена\nЕС, Япония, Канада → Form A (GSP) → снижена для отдельных товаров\nТурция → двустороннее соглашение → уточнять по коду\nУсловие одно — оригинал сертификата происхождения. Копия не работает.\n📌 Пример: Металлопрокат из России, пошлина 10%, партия $100 000. Просите СТ-1 → пошлина 0%. Экономия $10 000 с одной поставки.\n⚠️ Частая ошибка: Получить сертификат, но не заявить преференцию в декларации. Или забыть попросить СТ-1 у поставщика — после оформления вернуть пошлину нельзя.", "u": "https://telegra.ph/Preferenciya-06-18", "l": "ru"}, {"t": "ГТД (Грузовая таможенная декларация)", "s": "ТАМОЖЕННЫЕ ПРОЦЕДУРЫ И РЕЖИМЫ", "b": "Главный документ таможенного оформления. Вы официально сообщаете таможне: что везёте, откуда, по какой цене, в каком режиме и сколько платежей уплатили. В Узбекистане подаётся электронно через АИС «Декларант» (Gold Soft).\n📌 Практика: Декларацию готовит таможенный брокер. Правильно заполненная — защита при любых претензиях. Ошибка в декларации = штраф или задержка груза.\n⚠️ Частая ошибка: Подавать декларацию в последний момент, когда груз уже стоит на СВХ. СВХ платное. Готовьте документы до прихода груза.", "u": "https://telegra.ph/GTD-Gruzovaya-tamozhennaya-deklaraciya-06-18", "l": "ru"}, {"t": "ИМ 40 — Выпуск для внутреннего потребления", "s": "ТАМОЖЕННЫЕ ПРОЦЕДУРЫ И РЕЖИМЫ", "b": "Основной режим при импорте. Вы ввозите товар, платите все таможенные платежи — и товар становится вашим полностью. Можно продавать, использовать, перерабатывать без ограничений. 90% всего импорта в Узбекистан оформляется именно по ИМ 40.", "u": "https://telegra.ph/IM-40--Vypusk-dlya-vnutrennego-potrebleniya-06-18", "l": "ru"}, {"t": "ЭК 10 — Экспорт", "s": "ТАМОЖЕННЫЕ ПРОЦЕДУРЫ И РЕЖИМЫ", "b": "Режим вывоза товара за пределы Узбекистана с обязательством не возвращать его обратно. При экспорте НДС = 0% (нулевая ставка, не освобождение) — вы можете вернуть входящий НДС.\n⚠️ Частая ошибка: Путать нулевую ставку НДС и освобождение от НДС. При нулевой ставке право на вычет входящего НДС есть. При освобождении — нет.", "u": "https://telegra.ph/EHK-10--EHksport-06-18", "l": "ru"}, {"t": "ИМ 70 — Таможенный склад", "s": "ТАМОЖЕННЫЕ ПРОЦЕДУРЫ И РЕЖИМЫ", "b": "Ввозите товар в Узбекистан, но пока не платите пошлины и НДС. Товар хранится на специальном складе под таможенным контролем. Платежи — только когда решаете выпустить товар в продажу или вывезти.\n⚠️ Частая ошибка: Думать что это бесплатно. Хранение на таможенном складе платное. Считайте экономию на платежах против стоимости хранения.", "u": "https://telegra.ph/IM-70--Tamozhennyj-sklad-06-18", "l": "ru"}, {"t": "ИМ 74 — Переработка на таможенной территории", "s": "ТАМОЖЕННЫЕ ПРОЦЕДУРЫ И РЕЖИМЫ", "b": "Ввозите сырьё или компоненты для производства — пошлины и НДС не платите. Перерабатываете. Готовую продукцию вывозите обратно. Режим для производителей, работающих на экспорт.\n⚠️ Частая ошибка: Нарушить сроки переработки или вывоза. Если товар не вывезен в срок — платежи начисляются автоматически, плюс штрафы.", "u": "https://telegra.ph/IM-74--Pererabotka-na-tamozhennoj-territorii-06-18", "l": "ru"}, {"t": "ND 40 — Временный ввоз", "s": "ТАМОЖЕННЫЕ ПРОЦЕДУРЫ И РЕЖИМЫ", "b": "Ввозите товар на время — с обязательством вывезти обратно. Пошлины и НДС либо не платите совсем, либо платите частично. Для выставочного оборудования, профессиональной техники для съёмок, корпоративного транспорта.\n⚠️ Частая ошибка: Забыть про срок и не вывезти товар вовремя. Нарушение — платежи + штраф.", "u": "https://telegra.ph/ND-40--Vremennyj-vvoz-06-18", "l": "ru"}, {"t": "Транзит (ТТ 10)", "s": "ТАМОЖЕННЫЕ ПРОЦЕДУРЫ И РЕЖИМЫ", "b": "Товар едет через Узбекистан из одной страны в другую. Платежи не уплачиваются — товар идёт под таможенным контролем от въезда до выезда. Узбекистан — важный транзитный коридор между Россией/СНГ и Афганистаном, Китаем и Европой.", "u": "https://telegra.ph/Tranzit-TT-10-06-18", "l": "ru"}, {"t": "СВХ (Склад временного хранения)", "s": "ТАМОЖЕННЫЕ ПРОЦЕДУРЫ И РЕЖИМЫ", "b": "Место, где груз ждёт пока вы готовите таможенную декларацию. Товар попадает туда сразу после прибытия в страну. Максимальный срок хранения — 2 месяца. Хранение платное — за каждые сутки и за каждую тонну.\n📌 Пример: Груз прибыл в пятницу вечером. Документы не готовы. Декларацию подадите в понедельник. Три дня на СВХ — это деньги. Готовьте документы до прихода груза.\n⚠️ Частая ошибка: Считать СВХ «бесплатной паузой». Это одна из самых распространённых лишних трат при импорте.", "u": "https://telegra.ph/SVH-Sklad-vremennogo-hraneniya-06-18", "l": "ru"}, {"t": "Условный выпуск", "s": "ТАМОЖЕННЫЕ ПРОЦЕДУРЫ И РЕЖИМЫ", "b": "Груз выпускают до завершения всех проверок. Вы вносите обеспечение — деньги или банковскую гарантию на сумму спорных платежей.\n📌 Практика: Таможня назначила КТС, но груз нужен срочно. Вносите обеспечение → забираете товар → продолжаете оспаривать КТС. Если выиграете — обеспечение вернут.\n⚠️ Частая ошибка: Не знать об этом инструменте и держать груз на СВХ всё время спора.", "u": "https://telegra.ph/Uslovnyj-vypusk-06-18", "l": "ru"}, {"t": "Таможенный досмотр", "s": "ТАМОЖЕННЫЕ ПРОЦЕДУРЫ И РЕЖИМЫ", "b": "Физическая проверка товара инспектором. Вскрывают упаковку, пересчитывают, взвешивают, сверяют с декларацией. Бывает основным, повторным и идентификационным.\n📌 Практика: Досмотр — не наказание. Это инструмент СУР. Попасть на досмотр может любая компания. Главное: сопроводительные документы должны точно соответствовать фактическому грузу.\n⚠️ Частая ошибка: Паниковать при досмотре и пытаться «решить вопрос» неформально. Если документы в порядке — досмотр пройдёт без последствий.", "u": "https://telegra.ph/Tamozhennyj-dosmotr-06-18", "l": "ru"}, {"t": "СУР (Система управления рисками)", "s": "ТАМОЖЕННЫЕ ПРОЦЕДУРЫ И РЕЖИМЫ", "b": "Автоматизированная система таможни. Анализирует каждую декларацию и решает: выпустить без проверки (зелёный), проверить документы (жёлтый) или назначить досмотр (красный).\n🟢 Зелёный коридор — автовыпуск без проверки\n🟡 Жёлтый коридор — документальная проверка\n🔴 Красный коридор — физический досмотр\n📌 Практика: Попасть в красный коридор не значит что вы нарушили. Это статистика и алгоритмы. Чем дольше работаете чисто — тем чаще зелёный.", "u": "https://telegra.ph/SUR-Sistema-upravleniya-riskami-06-18", "l": "ru"}, {"t": "Инвойс (коммерческий счёт)", "s": "ДОКУМЕНТЫ", "b": "Главный документ сделки от продавца покупателю. Содержит наименование товара, количество, цену, условия поставки и реквизиты сторон. Основной документ для расчёта таможенной стоимости.\nОбязательно в инвойсе: код ТН ВЭД, количество, вес нетто/брутто, цена за единицу, валюта, Incoterms, страна происхождения, реквизиты сторон, номер и дата контракта.\n⚠️ Частая ошибка: Принимать инвойс в любом виде «лишь бы была цена». Неправильно оформленный инвойс — главная причина задержек и КТС.", "u": "https://telegra.ph/Invojs-kommercheskij-schyot-06-18", "l": "ru"}, {"t": "Упаковочный лист (Packing List)", "s": "ДОКУМЕНТЫ", "b": "Детальный список содержимого каждого грузового места: что, сколько, в какой упаковке, вес каждого места. Без него таможня не понимает что находится в каждой коробке — автоматически повышается риск досмотра.\n⚠️ Частая ошибка: Присылать один общий список вместо разбивки по местам. При досмотре инспектор должен видеть содержимое каждой конкретной коробки.", "u": "https://telegra.ph/Upakovochnyj-list-Packing-List-06-18", "l": "ru"}, {"t": "CMR", "s": "ДОКУМЕНТЫ", "b": "Транспортная накладная при автомобильной перевозке. Международный стандарт — действует во всех странах, подписавших Конвенцию CMR. Содержит: отправитель, получатель, маршрут, описание груза, условия перевозки. Большинство грузов в Узбекистан едут автотранспортом.", "u": "https://telegra.ph/CMR-06-18", "l": "ru"}, {"t": "TIR (книжка МДП)", "s": "ДОКУМЕНТЫ", "b": "Международная система таможенного транзита для автомобильных перевозок. Книжка TIR — гарантия уплаты таможенных платежей во всех странах маршрута. Без неё — таможенное оформление в каждой транзитной стране отдельно.\n📌 Практика: Большинство фур из Европы и Турции в Узбекистан едут по TIR. Книжка открывается в стране отправления и закрывается в Узбекистане.\n⚠️ Частая ошибка: Путать TIR и CMR. CMR — договор перевозки. TIR — таможенный транзитный документ. Они идут вместе, но это разные вещи.", "u": "https://telegra.ph/TIR-knizhka-MDP-06-18", "l": "ru"}, {"t": "Коносамент (Bill of Lading, B/L)", "s": "ДОКУМЕНТЫ", "b": "Транспортный документ при морской перевозке. Одновременно является: договором перевозки, распиской капитана и товарораспорядительным документом (тот у кого он есть — тот и владелец груза).\n⚠️ Частая ошибка: Не контролировать, на кого выписан коносамент. Если на экспедитора — могут возникнуть проблемы с получением груза.", "u": "https://telegra.ph/Konosament-Bill-of-Lading-BL-06-18", "l": "ru"}, {"t": "Авианакладная (Air Waybill, AWB)", "s": "ДОКУМЕНТЫ", "b": "Транспортный документ при авиаперевозке. В отличие от коносамента — не является товарораспорядительным. Используется для срочных, высокоценных или скоропортящихся грузов.", "u": "https://telegra.ph/Avianakladnaya-Air-Waybill-AWB-06-18", "l": "ru"}, {"t": "ЖД накладная (СМГС/CIM)", "s": "ДОКУМЕНТЫ", "b": "Транспортный документ при железнодорожной перевозке. СМГС — для стран СНГ, CIM — для европейских. Основной способ доставки крупных партий из России, Казахстана, Китая.", "u": "https://telegra.ph/ZHD-nakladnaya-SMGSCIM-06-18", "l": "ru"}, {"t": "Экспортная декларация страны отправления", "s": "ДОКУМЕНТЫ", "b": "Документ, которым иностранный продавец оформил вывоз товара у себя в стране. Подтверждает: товар легально покинул страну по заявленной цене.\n📌 Практика: Таможня Узбекистана запрашивает при КТС. Если цена на выходе совпадает с вашим инвойсом — сильный аргумент против КТС.\n⚠️ Частая ошибка: Не просить у поставщика заранее. После отгрузки получить сложнее.", "u": "https://telegra.ph/EHksportnaya-deklaraciya-strany-otpravleniya-06-18", "l": "ru"}, {"t": "Страховой полис (карго-страхование)", "s": "ДОКУМЕНТЫ", "b": "Документ, подтверждающий страхование груза на время перевозки. Покрывает риски утраты, повреждения, кражи.\nПри CIF продавец обязан застраховать груз — но минимальное покрытие (ICC C, 110% стоимости). Если хотите полное покрытие — прописывайте ICC A в контракте. При EXW, FOB — страхуете груз сами. Страховая премия включается в таможенную стоимость.", "u": "https://telegra.ph/Strahovoj-polis-kargo-strahovanie-06-18", "l": "ru"}, {"t": "Сертификат происхождения", "s": "ДОКУМЕНТЫ", "b": "Документ, подтверждающий страну происхождения товара. Даёт право на преференциальную ставку пошлины.\nСТ-1 → страны СНГ → пошлина 0% или снижена\nEUR.1 → товары из ЕС → снижена для отдельных групп\nForm A → GSP (развивающиеся страны) → снижена\nCO (Certificate of Origin) → универсальный, без преференций\n⚠️ Частая ошибка: Запрашивать сертификат после отгрузки. Некоторые виды (например СТ-1) оформляются только до или во время отгрузки.", "u": "https://telegra.ph/Sertifikat-proishozhdeniya-06-18", "l": "ru"}, {"t": "СТ-1", "s": "ДОКУМЕНТЫ", "b": "Сертификат происхождения для товаров из стран СНГ. Даёт право на нулевую или сниженную ставку пошлины. Выдаётся Торгово-промышленной палатой страны-экспортёра.\nСтраны: Россия, Казахстан, Беларусь, Кыргызстан, Таджикистан, Армения, Азербайджан, Молдова, Украина.", "u": "https://telegra.ph/ST-1-06-18", "l": "ru"}, {"t": "Контракт (внешнеторговый)", "s": "ДОКУМЕНТЫ", "b": "Основной юридический документ между вами и иностранным партнёром.\nПолные реквизиты сторон\nОписание товара (наименование, код ТН ВЭД, количество, качество)\nЦена и валюта\nУсловия поставки (Incoterms)\nУсловия оплаты (предоплата, аккредитив, отсрочка)\nПорядок оформления разрешительных документов\nПрименимое право и порядок разрешения споров\n⚠️ Частая ошибка: Не прописывать кто оформляет сертификат происхождения и разрешительные документы. Потом выясняется что никто.", "u": "https://telegra.ph/Kontrakt-vneshnetorgovyj-06-18", "l": "ru"}, {"t": "Спецификация к контракту", "s": "ДОКУМЕНТЫ", "b": "Приложение к контракту с детальным описанием каждой партии: наименования, артикулы, количество, цены по позициям. Неотъемлемая часть контракта. При регулярных поставках удобнее рамочный контракт + спецификация на каждую партию.", "u": "https://telegra.ph/Specifikaciya-k-kontraktu-06-18", "l": "ru"}, {"t": "Сертификат качества", "s": "ДОКУМЕНТЫ", "b": "Документ производителя или независимой лаборатории, подтверждающий качественные характеристики конкретной партии товара.\n📌 Важно: Не путать с сертификатом соответствия. Сертификат качества — от производителя, на партию. Сертификат соответствия — от аккредитованного органа, на соответствие техрегламенту.", "u": "https://telegra.ph/Sertifikat-kachestva-06-18", "l": "ru"}, {"t": "Технический паспорт / Руководство по эксплуатации", "s": "ДОКУМЕНТЫ", "b": "Документация производителя на технику и оборудование. Обязателен при ввозе оборудования, электроники, медтехники. Должен быть на русском или узбекском языке — или с нотариально заверенным переводом.", "u": "https://telegra.ph/Tehnicheskij-pasport--Rukovodstvo-po-ehkspluatacii-06-18", "l": "ru"}, {"t": "Акт приёма-передачи", "s": "ДОКУМЕНТЫ", "b": "Документ, фиксирующий фактическую передачу товара от продавца покупателю: дата, место, состояние, количество. Подписанный акт — доказательство того, что товар принят в надлежащем состоянии.\n⚠️ Частая ошибка: Отсутствие акта осложняет предъявление претензий перевозчику или продавцу при недостаче или повреждении.", "u": "https://telegra.ph/Akt-priyoma-peredachi-06-18", "l": "ru"}, {"t": "Паспорт сделки", "s": "ДОКУМЕНТЫ", "b": "Регистрация внешнеторгового контракта в уполномоченном банке. Нужна при превышении суммы контракта установленного порога. Без паспорта сделки банк не проведёт платёж за рубеж.\n⚠️ Частая ошибка: Платить иностранному поставщику до открытия паспорта сделки. Банк заблокирует платёж.", "u": "https://telegra.ph/Pasport-sdelki-06-18", "l": "ru"}, {"t": "Сертификат соответствия", "s": "РАЗРЕШИТЕЛЬНЫЕ ДОКУМЕНТЫ", "b": "Подтверждение: товар соответствует стандартам и техническим требованиям Узбекистана. Выдаётся аккредитованным органом после испытаний в лаборатории. Без него таможня не выпустит товар.\n⚠️ Частая ошибка: Начинать оформление сертификата, когда груз уже на СВХ. Сертификат заказывают одновременно с отгрузкой.", "u": "https://telegra.ph/Sertifikat-sootvetstviya-06-18", "l": "ru"}, {"t": "Схема 7А", "s": "РАЗРЕШИТЕЛЬНЫЕ ДОКУМЕНТЫ", "b": "Самая распространённая схема сертификации для импортёров. Сертификат выдаётся на конкретный контракт, срок действия — 1 год. Один сертификат покрывает все поставки по данному контракту в течение года.\nЧто нужно: код ТН ВЭД и описание товара, контракт и инвойс, техническая документация, образцы для испытаний.", "u": "https://telegra.ph/Shema-7A-06-18", "l": "ru"}, {"t": "Гигиеническое заключение", "s": "РАЗРЕШИТЕЛЬНЫЕ ДОКУМЕНТЫ", "b": "Разрешение органов санитарного надзора на ввоз товаров, контактирующих с человеком или окружающей средой. Орган: Госсанэпиднадзор (sanepid.uz).\nКосметика и парфюмерия\nПосуда и кухонный инвентарь\nДетские товары и игрушки\nПродукты питания, БАДы\nБытовая химия и чистящие средства\n⚠️ Практика: Часто требуется одновременно с сертификатом соответствия. Уточняйте по коду ТН ВЭД заранее.", "u": "https://telegra.ph/Gigienicheskoe-zaklyuchenie-06-18", "l": "ru"}, {"t": "Ветеринарный сертификат", "s": "РАЗРЕШИТЕЛЬНЫЕ ДОКУМЕНТЫ", "b": "Разрешение ветеринарной службы на ввоз животных и продукции животного происхождения. Орган: Госветслужба (vetgov.uz). Ветсертификат страны-экспортёра обязателен — без него груз разворачивают на границе.\nЖивые животные и птица\nМясо и мясопродукты\nРыба и морепродукты\nМолоко и молочные продукты\nКорма для животных, шкуры, шерсть", "u": "https://telegra.ph/Veterinarnyj-sertifikat-06-18", "l": "ru"}, {"t": "Фитосанитарный сертификат", "s": "РАЗРЕШИТЕЛЬНЫЕ ДОКУМЕНТЫ", "b": "Разрешение карантинной службы на ввоз растений и растительной продукции. Орган: Госкарантинная инспекция (karantin.uz). При малейших признаках карантинных объектов груз могут задержать или уничтожить.\nСвежие фрукты и овощи\nСемена и посадочный материал\nЗерно и продукты его переработки\nСрезанные цветы, растительное сырьё", "u": "https://telegra.ph/Fitosanitarnyj-sertifikat-06-18", "l": "ru"}, {"t": "Регистрационное удостоверение (РУ)", "s": "РАЗРЕШИТЕЛЬНЫЕ ДОКУМЕНТЫ", "b": "Специальное разрешение для ввоза лекарственных средств и медицинских изделий. Без РУ таможня медтехнику и лекарства не выпустит. Срок получения — от нескольких месяцев. Орган: Агентство по развитию фармацевтической отрасли (miit.uz).\n⚠️ Частая ошибка: Ввозить медизделие без РУ, рассчитывая «потом разберёмся». Груз арестуют на таможне.", "u": "https://telegra.ph/Registracionnoe-udostoverenie-RU-06-18", "l": "ru"}, {"t": "Лицензия на импорт/экспорт", "s": "РАЗРЕШИТЕЛЬНЫЕ ДОКУМЕНТЫ", "b": "Специальное государственное разрешение на ввоз или вывоз отдельных категорий товаров. Без лицензии — не только таможня не выпустит, но и уголовная ответственность возможна. Проверяйте перечень на lex.uz до заключения контракта.\nИмпорт: оружие, наркотические вещества, товары двойного назначения, драгметаллы\nЭкспорт: стратегическое сырьё, антиквариат и культурные ценности", "u": "https://telegra.ph/Licenziya-na-importehksport-06-18", "l": "ru"}, {"t": "Incoterms 2020", "s": "УСЛОВИЯ ПОСТАВКИ INCOTERMS 2020", "b": "Международные правила ICC, отвечающие на три вопроса в любой торговой сделке: кто оплачивает доставку и до какого момента, кто несёт риск потери или повреждения груза, кто оформляет документы и разрешения.\nДля таможни: условие поставки определяет таможенную стоимость. Узбекская таможня считает на базе CIF. Если в контракте другое условие — нужно пересчитать к CIF.", "u": "https://telegra.ph/Incoterms-2020-06-18-2", "l": "ru"}, {"t": "EXW (Ex Works — франко-завод)", "s": "УСЛОВИЯ ПОСТАВКИ INCOTERMS 2020", "b": "Продавец сделал минимум: подготовил товар на своём складе. Всё остальное — ваша забота. Ваши расходы: погрузка + внутренняя перевозка в стране продавца + экспортное оформление + международная перевозка + страховка + доставка до вашего склада.\n📌 Для таможни: Таможенная стоимость при EXW = цена в инвойсе + ВСЕ расходы до границы УЗ.", "u": "https://telegra.ph/EXW-Ex-Works--franko-zavod-06-18", "l": "ru"}, {"t": "FOB (Free On Board — франко-борт)", "s": "УСЛОВИЯ ПОСТАВКИ INCOTERMS 2020", "b": "Продавец доставляет товар до борта судна в порту отгрузки и грузит его. После погрузки — риск ваш. Только для морских перевозок.\n📌 Для таможни: Таможенная стоимость при FOB = цена FOB + фрахт до границы УЗ + страховка. Не забудьте добавить фрахт — это частая причина КТС.", "u": "https://telegra.ph/FOB-Free-On-Board--franko-bort-06-18", "l": "ru"}, {"t": "CIF (Cost, Insurance, Freight)", "s": "УСЛОВИЯ ПОСТАВКИ INCOTERMS 2020", "b": "Продавец оплачивает фрахт и страховку до порта назначения. CIF — базовое условие для расчёта таможенной стоимости в Узбекистане. Все другие условия пересчитываются к нему.\n⚠️ Практика: При CIF продавец выбирает страховку — минимальное покрытие по умолчанию (ICC C). Если хотите полное — прописывайте ICC A в контракте.", "u": "https://telegra.ph/CIF-Cost-Insurance-Freight-06-18", "l": "ru"}, {"t": "DAP (Delivered At Place)", "s": "УСЛОВИЯ ПОСТАВКИ INCOTERMS 2020", "b": "Продавец доставляет товар до вашего склада в Узбекистане. Таможенное оформление и платежи — ваша задача.\n📌 Для таможни: Таможенная стоимость при DAP = цена DAP минус расходы после границы УЗ. Запросите у экспедитора расчёт «от границы».", "u": "https://telegra.ph/DAP-Delivered-At-Place-06-18", "l": "ru"}, {"t": "DDP (Delivered Duty Paid)", "s": "УСЛОВИЯ ПОСТАВКИ INCOTERMS 2020", "b": "Продавец берёт на себя абсолютно всё: доставку, таможенное оформление, уплату всех пошлин и налогов в вашей стране. В Узбекистане редкость.\n⚠️ Осторожно: При DDP вы теряете контроль над таможенным оформлением. При проверке претензии — к вам как получателю.", "u": "https://telegra.ph/DDP-Delivered-Duty-Paid-06-18", "l": "ru"}, {"t": "Валютный контроль", "s": "ВАЛЮТНЫЙ КОНТРОЛЬ И БАНК", "b": "Система наблюдения государства за движением иностранной валюты. В Узбекистане осуществляет Центральный банк (cbu.uz) через уполномоченные коммерческие банки. Каждый платёж за рубеж и каждое поступление кузатади и сверяется с контрактом.", "u": "https://telegra.ph/Valyutnyj-kontrol-06-18", "l": "ru"}, {"t": "Репатриация валютной выручки", "s": "ВАЛЮТНЫЙ КОНТРОЛЬ И БАНК", "b": "Обязанность экспортёра вернуть валютную выручку на счёт в узбекском банке в установленные сроки.\n⚠️ Частая ошибка: Давать иностранному покупателю длинную отсрочку без согласования с банком. Сроки репатриации фиксированы — их нарушение не зависит от условий контракта.", "u": "https://telegra.ph/Repatriaciya-valyutnoj-vyruchki-06-18", "l": "ru"}, {"t": "Конвертация", "s": "ВАЛЮТНЫЙ КОНТРОЛЬ И БАНК", "b": "Обмен иностранной валюты на узбекские сумы для расчётов внутри страны или уплаты таможенных платежей. Таможенные платежи уплачиваются в сумах по курсу ЦБ на дату подачи декларации. Курс меняется ежедневно.\n📌 Совет: При планировании бюджета поставки закладывайте небольшой резерв на курсовую разницу.", "u": "https://telegra.ph/Konvertaciya-06-18", "l": "ru"}, {"t": "Валютная оговорка", "s": "ВАЛЮТНЫЙ КОНТРОЛЬ И БАНК", "b": "Условие в контракте, защищающее от курсовых рисков. Фиксирует, в какой валюте пересчитывается цена при изменении курса. Без оговорки при изменении курса один из партнёров теряет деньги.", "u": "https://telegra.ph/Valyutnaya-ogovorka-06-18", "l": "ru"}, {"t": "ГТК (Государственный таможенный комитет)", "s": "ОРГАНИЗАЦИИ И ИСТОЧНИКИ", "b": "Главный таможенный орган Узбекистана. Принимает декларации, контролирует перемещение товаров, устанавливает правила оформления. Сайт: customs.uz. Тарифы и коды: tariff.customs.uz.", "u": "https://telegra.ph/GTK-Gosudarstvennyj-tamozhennyj-komitet-06-18", "l": "ru"}, {"t": "O'zstandart (Узстандарт)", "s": "ОРГАНИЗАЦИИ И ИСТОЧНИКИ", "b": "Агентство по техническому регулированию и метрологии. Разрабатывает стандарты, аккредитует органы сертификации и испытательные лаборатории. Сайт: standart.uz.", "u": "https://telegra.ph/Ozstandart-Uzstandart-06-18", "l": "ru"}, {"t": "O'ZAKK (Узбекский центр аккредитации)", "s": "ОРГАНИЗАЦИИ И ИСТОЧНИКИ", "b": "Ведёт официальный реестр всех аккредитованных органов по сертификации и испытательных лабораторий. Сайт: akkred.uz. Перед обращением в орган — обязательно проверяйте статус аккредитации.\n⚠️ Частая ошибка: Работать с органом без проверки аккредитации. Если орган потерял аккредитацию — выданный им сертификат недействителен.", "u": "https://telegra.ph/OZAKK-Uzbekskij-centr-akkreditacii-06-18", "l": "ru"}, {"t": "Единое окно (Single Window)", "s": "ОРГАНИЗАЦИИ И ИСТОЧНИКИ", "b": "Государственный портал для получения разрешительных документов в электронном виде. Один вход — все ведомства. Проверить нужен ли документ по коду ТН ВЭД, подать заявку онлайн, отследить статус — всё на singlewindow.uz.", "u": "https://telegra.ph/Edinoe-okno-Single-Window-06-18", "l": "ru"}, {"t": "Lex.uz", "s": "ОРГАНИЗАЦИИ И ИСТОЧНИКИ", "b": "Официальная база нормативно-правовых актов Республики Узбекистан. Законы, постановления правительства, приказы ведомств — всё в актуальной редакции. Первоисточник для проверки ставок, льгот, требований и запретов.", "u": "https://telegra.ph/Lexuz-06-18", "l": "ru"}, {"t": "Tariff.customs.uz", "s": "ОРГАНИЗАЦИИ И ИСТОЧНИКИ", "b": "Официальный портал ГТК со ставками таможенных пошлин, кодами ТН ВЭД и дополнительными примечаниями. Первый сайт, который открываете при работе с любым товаром. Бесплатно, актуально, официально.\nВЭД Вики обновляется по мере изменения законодательства\nInCustom-Helper  ·  incustoms.uz  ·  @incustoms_uz", "u": "https://telegra.ph/Tariffcustomsuz-06-18", "l": "ru"}, {"t": "TN VED", "s": "TN VED VA TOVARLARNI TASNIFLASH", "b": "Xalqaro savdodagi barcha tovarlarning yagona klassifikatori. Har bir tovarga 10 xonali kod beriladi — u boj stavkasini, QQSni, aksizni va ruxsat beruvchi hujjatlar ro'yxatini belgilaydi.\nKod tuzilishi: 8471 30 000 0 — dastlabki 4 raqam guruh, keyin kichik guruh, aniqlashtirish va O'zbekiston detallashuvi.\n📌 Misol: Noutbuk — kod 8471 30 000 0: boj 0%, QQS 12%, muvofiqlik sertifikati kerak. Koddagi bitta noto'g'ri raqam — to'lovlarni qayta hisoblash va jarima xavfi.\n⚠️ Ko'p uchraydigan xato: Yetkazib beruvchidan kodni ko'r-ko'rona olish. Yetkazib beruvchi o'z mamlakatiga ko'ra tasniflaydi — kodlar mos kelmasligi mumkin. Doim tariff.customs.uz da tekshiring.", "u": "https://telegra.ph/TN-VED-06-18", "l": "uz"}, {"t": "OPI (TN VED ni talqin qilishning asosiy qoidalari)", "s": "TN VED VA TOVARLARNI TASNIFLASH", "b": "TN VED kodini rasman belgilaydigan oltita qoida. Tartib bo'yicha qo'llaniladi.\n1-qoida — tovar pozitsiyasi matni va bo'lim/guruh izohlarini o'qiymiz\n2-qoida — tugallanmagan yoki yig'ilmagan tovar\n3-qoida — bir nechta pozitsiya mos kelsa: eng aniqrog'ini olamiz\n4-qoida — o'xshash tovar bo'yicha analogiya\n5-qoida — qadoqlash va futlyarlar\n6-qoida — pozitsiya ichida subpozitsiyani aniqlash\n📌 Misol: MFQ olib kirasiz — printer+skaner+ko'chirish. Rasman uchta kod mos. OPI 3-qoida: asosiy funksiya bo'yicha olamiz. Asosiy — chop etish → printer kodi.\n⚠️ Ko'p uchraydigan xato: Guruh izohlarini o'qimasdan 'sog'lom fikr' bilan tasniflash. Izohlar ustunlik qiladi.", "u": "https://telegra.ph/OPI-TN-VED-ni-talqin-qilishning-asosiy-qoidalari-06-18", "l": "uz"}, {"t": "Tasniflash qarori", "s": "TN VED VA TOVARLARNI TASNIFLASH", "b": "Muayyan tovarga aniq TN VED kodini berish to'g'risidagi bojxonaning rasmiy qarori. Olingandan keyin barcha yetkazib berishlarda majburiy.\nQanday olish: DTQ ga ariza, tovar tavsifi, foto, texhujjatlar topshiriladi. DTQ 30 kun ichida javob beradi.\n📌 Misol: Tibbiy asbob: guruh 90 (boj 0%) yoki guruh 85 (boj 10%)? $200 000 lik partiyada farq $20 000. Tasniflash qarori kodni bir marta va abadiy belgilaydi.\n⚠️ Ko'p uchraydigan xato: Bu uzoq va murakkab deb o'ylab tasodifga ishonib ishlash. Qayta tasniflash bilan bir tekshiruv qaror olishdan qimmatga tushadi.", "u": "https://telegra.ph/Tasniflash-qarori-06-18", "l": "uz"}, {"t": "Bojxona boji", "s": "BOJXONA TO'LOVLARI", "b": "Tovarni mamlakatga olib kirish huquqi uchun davlatga to'lov. TN VED kodi va kelib chiqish mamlakatiga bog'liq.\nAdvалор — qiymatdan foiz. Misol: $10 000 dan 10% = $1 000\nSpetsifik — birlik uchun belgilangan summa. Misol: har kg uchun $2\nKombinatsiyalangan — kattaroq summani beruvchisi qo'llaniladi\n📌 Misol: Po'lat quvurlar, boj 10%, $50 000 lik partiya → boj $5 000. Lekin ST-1 sertifikati bor (Rossiya, MDH) → stavka 0% → boj $0. Bir hujjat = $5 000 tejash.\n⚠️ Ko'p uchraydigan xato: Yetkazib beruvchidan kelib chiqish sertifikati so'ramaslik. Bu bepul hujjat bojni butunlay bekor qilishi mumkin.", "u": "https://telegra.ph/Bojxona-boji-06-18", "l": "uz"}, {"t": "Bojxona qiymati", "s": "BOJXONA TO'LOVLARI", "b": "Barcha to'lovlar hisoblanadigan asos. Asosiy usul bo'yicha: tovar narxi + O'zbekiston chegarasigacha yetkazib berish + sug'urta.\nFormula: Bojxona qiymati = Tovar narxi (invoys) + Chegaragacha fracht + Sug'urta + Litsenzion to'lovlar\nEXW → hammasini qo'shing: yuklash, fracht, sug'urta\nFOB → jo'natish portidan fracht va sug'urtani qo'shing\nCIF → hech narsa qo'shilmaydi, allaqachon kiritilgan\nDAP → O'zbekiston chegarasidan keyingi xarajatlarni ayiring\n📌 Misol: Tovar $10 000, FOB Shanxay. Fracht $1 200, sug'urta $80. Bojxona qiymati = $11 280. Aynan shu summadan boj va QQS hisoblanadi — invoysdagi $10 000 dan emas.\n⚠️ Ko'p uchraydigan xato: Deklaratsiyada frachtsiz faqat invoys narxini ko'rsatish. Bojxona buni ko'radi va BTS tayinlaydi.", "u": "https://telegra.ph/Bojxona-qiymati-06-18", "l": "uz"}, {"t": "BTS (Bojxona qiymatini tuzatish)", "s": "BOJXONA TO'LOVLARI", "b": "Inspektorning invoysdagi narxdan yuqoriroq deb qarori. To'lovlar qo'shimcha hisoblanadi — yuk to'lamaguncha yoki garov kiritmaguncha turadi.\nNarx bojxona bazasidagi o'xshash tovarlarnikidan past\nNarxni tasdiqlovchi hujjatlar yetarli emas\nSotuvchi va xaridor bog'liq shaxslar\nNoodatiy to'lov shartlari (barter, bo'lib to'lash)\n📌 Misol: Poyabzal $8 juftdan. Indikativ $12. BTS — $12 dan qo'shimcha to'lov. Yuk VXS da turadi. To'g'ri: garov kiriting, yukni oling, hujjatlar bilan bahslashing.\n⚠️ Ko'p uchraydigan xato: Jimgina BTSga rozi bo'lish. Bu pretsedent yaratadi — keyingi yetkazib berishda ham $12 bo'ladi.", "u": "https://telegra.ph/BTS-Bojxona-qiymatini-tuzatish-06-18", "l": "uz"}, {"t": "Import QQS", "s": "BOJXONA TO'LOVLARI", "b": "O'zbekistonga tovar olib kirishda qo'shilgan qiymat solig'i. Stavka — 12%. Tovar narxiga emas, boj va aksizdan keyingi umumiy summaga hisoblanadi.\nFormula: QQS = (Bojxona qiymati + Boj + Aksiz) × 12%\nUMAS (QQS to'lovchisi) → to'langan QQSni sotishda hisobga olasiz. Soddalashtirilgan tizim → QQS tannarxga kiritiladi.\n📌 Misol: TS $11 280, boj $1 128, aksiz $0. QQS bazasi $12 408. QQS 12% = $1 489. Ko'pchilik tovarlar uchun QQS — eng katta to'lov.\n⚠️ Ko'p uchraydigan xato: Faqat bojni hisoblash va QQSni unutish. Ayniqsa soddalashtirilgan tizimda kichik biznes uchun muhim.", "u": "https://telegra.ph/Import-QQS-06-18", "l": "uz"}, {"t": "Aksiz", "s": "BOJXONA TO'LOVLARI", "b": "Muayyan tovar toifalari uchun qo'shimcha soliq. QQS dan oldin hisoblanadi va uning bazasini oshiradi.\nAlkogol va pivo\nTamaki, sigaretlar, elektron sigaretlar\nNeft mahsulotlari: benzin, dizel, aviakerоsin\nYengil avtomobillar (dvigatel hajmiga qarab)\nPolietilen paketlar\n📌 Misol: 2 000 kub.sm dvigatellik avtomobil. Aksiz har kub.sm uchun hisoblanadi. Keyin (TS + aksiz) ga 12% QQS. Aksizni bilmasdan hisoblasangiz natija bir necha baravar xato.\n⚠️ Ko'p uchraydigan xato: Avtomobil importida faqat boj va QQSni hisoblash. Aksiz + utilizatsiya yig'imi ko'pincha boshqa barcha to'lovlardan ko'proq.", "u": "https://telegra.ph/Aksiz-06-18", "l": "uz"}, {"t": "Bojxona yig'imi", "s": "BOJXONA TO'LOVLARI", "b": "Deklaratsiyangiz bo'yicha bojxona operatsiyalari uchun belgilangan to'lov. Tovarning bojxona qiymatiga bog'liq. Barcha to'lovlar ichida eng kichigi, lekin boj va QQS bilan birga to'lanadi.\n⚠️ Ko'p uchraydigan xato: Yetkazib berish byudjetini rejalashtirishda yig'imni hisobga olmaslik.", "u": "https://telegra.ph/Bojxona-yigimi-06-18", "l": "uz"}, {"t": "Utilizatsiya yig'imi", "s": "BOJXONA TO'LOVLARI", "b": "Transport vositalari va o'z yuruvchi texnika uchun to'lov. Texnikani utilizatsiya qilishni ta'minlash uchun davlat oldindan oladi.\nYengil va yuk avtomobillari\nAvtobus va mikroavtobuslar\nMaxsus texnika: ekskavatorlar, kranlar, yuk ko'targichlar\nTirkamalar va yarim tirkamalar\n⚠️ Ko'p uchraydigan xato: Texnika qiymatini hisoblashda yig'imni hisobga olmaslik. Avtoparkni importda byudjet minusga ketishi mumkin.", "u": "https://telegra.ph/Utilizatsiya-yigimi-06-18", "l": "uz"}, {"t": "Preferentsiya", "s": "BOJXONA TO'LOVLARI", "b": "Muayyan mamlakatlardan kelgan tovarlar uchun kamaytirilgan yoki nol bojxona boji stavkasi. O'zbekistonning xalqaro shartnomalari asosida.\nMDH (Rossiya, Qozog'iston, Belarus va boshqalar) → ST-1 → boj 0% yoki kamaytirilgan\nYeI, Yaponiya, Kanada → Form A (GSP) → alohida tovarlar uchun kamaytirilgan\nTurkiya → ikki tomonlama shartnoma → aniq kod bo'yicha aniqlash\nBitta shart — kelib chiqish sertifikatining originali. Nusxa ishlamaydi.\n📌 Misol: Metalloprokat Rossiyadan, boj 10%, $100 000 lik partiya. ST-1 so'rasiz → boj 0%. Tejash $10 000.\n⚠️ Ko'p uchraydigan xato: Sertifikatni olish, lekin deklaratsiyada preferentsiyani e'lon qilmaslik. Yoki ST-1 so'rashni unutish.", "u": "https://telegra.ph/Preferentsiya-06-18", "l": "uz"}, {"t": "YTD (Yuk bojxona deklaratsiyasi)", "s": "BOJXONA TARTIBLARI VA REJIMLARI", "b": "Bojxona rasmiylashtirishning asosiy hujjati. O'zbekistonda AIS 'Deklarant' (Gold Soft dasturi) orqali elektron shaklda topshiriladi. Qabul qilingan deklaratsiyasiz yuk chiqarilmaydi.\n⚠️ Ko'p uchraydigan xato: Yuk VXS da turganida oxirgi daqiqada deklaratsiya topshirish. VXS — pullik. Yuk kelishidan oldin hujjatlar tayyorlanadi.", "u": "https://telegra.ph/YTD-Yuk-bojxona-deklaratsiyasi-06-18", "l": "uz"}, {"t": "IM 40 — Ichki iste'mol uchun chiqarish", "s": "BOJXONA TARTIBLARI VA REJIMLARI", "b": "Importdagi asosiy rejim. Barcha bojxona to'lovlari to'lanadi — tovar to'liq sizniki bo'ladi. Cheklovsiz sotish, ishlatish, qayta ishlash mumkin. O'zbekistonga barcha importning 90% aynan IM 40 bo'yicha.", "u": "https://telegra.ph/IM-40--Ichki-istemol-uchun-chiqarish-06-18", "l": "uz"}, {"t": "EK 10 — Eksport", "s": "BOJXONA TARTIBLARI VA REJIMLARI", "b": "O'zbekistondan tovarni olib chiqish rejimi. Eksportda QQS = 0% (nol stavka, ozod qilish emas) — kiruvchi QQSni qaytarib olish mumkin.\n⚠️ Ko'p uchraydigan xato: Nol QQS stavkasini QQSdan ozod qilish bilan aralashtirib yuborish. Nol stavkada chegirma huquqi bor, ozod qilishda — yo'q.", "u": "https://telegra.ph/EK-10--Eksport-06-18", "l": "uz"}, {"t": "IM 70 — Bojxona ombori", "s": "BOJXONA TARTIBLARI VA REJIMLARI", "b": "Tovarni olib kirasiz, lekin hozircha boj va QQS to'lamaysiz. Tovar bojxona nazorati ostida maxsus omborida saqlanadi. To'lovlar — faqat sotuvga chiqarish yoki qaytarib olib ketishga qaror qilganda.\n⚠️ Ko'p uchraydigan xato: Bu bepul deb o'ylash. Bojxona omborida saqlash — pullik.", "u": "https://telegra.ph/IM-70--Bojxona-ombori-06-18", "l": "uz"}, {"t": "IM 74 — Hududda qayta ishlash", "s": "BOJXONA TARTIBLARI VA REJIMLARI", "b": "Ishlab chiqarish uchun xom ashyo olib kirasiz — boj va QQS to'lamaysiz. Qayta ishlaysiz. Tayyor mahsulotni qaytarib olib chiqasiz. Eksportga ishlaydigan ishlab chiqaruvchilar uchun rejim.\n⚠️ Ko'p uchraydigan xato: Qayta ishlash yoki olib chiqish muddatlarini buzish. Tovar o'z vaqtida olib chiqilmasa — to'lovlar avtomatik + jarimalar.", "u": "https://telegra.ph/IM-74--Hududda-qayta-ishlash-06-18", "l": "uz"}, {"t": "ND 40 — Vaqtinchalik olib kirish", "s": "BOJXONA TARTIBLARI VA REJIMLARI", "b": "Tovarni vaqtincha olib kirasiz — qaytarib olib chiqish majburiyati bilan. Boj va QQS yoki umuman to'lanmaydi, yoki qisman. Ko'rgazma uskunalari, professional texnika, korporativ transport uchun.\n⚠️ Ko'p uchraydigan xato: Muddatni unutib, tovarni o'z vaqtida olib chiqmaslik. Qoidabuzarlik — to'lovlar + jarima.", "u": "https://telegra.ph/ND-40--Vaqtinchalik-olib-kirish-06-18", "l": "uz"}, {"t": "Tranzit (TT 10)", "s": "BOJXONA TARTIBLARI VA REJIMLARI", "b": "Tovar bir mamlakatdan ikkinchisiga O'zbekiston orqali o'tadi. To'lovlar to'lanmaydi — bojxona nazorati ostida boradi. O'zbekiston — Rossiya/MDH va Afg'oniston, Xitoy va Yevropa o'rtasidagi muhim tranzit yo'lak.", "u": "https://telegra.ph/Tranzit-TT-10-06-18-2", "l": "uz"}, {"t": "VXS (Vaqtinchalik saqlash ombori)", "s": "BOJXONA TARTIBLARI VA REJIMLARI", "b": "Yuk mamlakatga kelgandan keyin deklaratsiya tayyorlanguncha 'kutadigan' joy. Maksimal muddat — 2 oy. Saqlash pullik — har sutkada va har tonnada.\n📌 Misol: Yuk juma kechqurun keldi. Hujjatlar tayyor emas. Deklaratsiyani dushanba kuni topshirasiz. VXS da uch kun — bu pul. Yuk kelishidan oldin hujjatlarni tayyorlang.\n⚠️ Ko'p uchraydigan xato: VXSni 'bepul pauza' deb hisoblash. Bu importdagi eng keng tarqalgan keraksiz xarajat.", "u": "https://telegra.ph/VXS-Vaqtinchalik-saqlash-ombori-06-18", "l": "uz"}, {"t": "Shartli chiqarish", "s": "BOJXONA TARTIBLARI VA REJIMLARI", "b": "Yuk barcha tekshiruvlar tugaguncha chiqariladi. Garov kiritiladi — bahsli to'lovlar summasiga pul yoki bank kafolati.\n📌 Amalda: BTS tayinlandi, lekin yuk shoshilinch kerak. Garov kiriting → tovarni oling → BTS ni bahslashtirishda davom eting. Yutib chiqsangiz — garov qaytariladi.\n⚠️ Ko'p uchraydigan xato: Bu vositani bilmaslik va yukni VXS da bahslashish vaqti ichida ushlab turish.", "u": "https://telegra.ph/Shartli-chiqarish-06-18", "l": "uz"}, {"t": "Bojxona tekshiruvi", "s": "BOJXONA TARTIBLARI VA REJIMLARI", "b": "Inspektorning tovarni jismoniy tekshiruvi. Qadoqni ochadi, sanaydi, tortadi, deklaratsiya bilan solishtiradi. Asosiy, takroriy va identifikatsiya turlari mavjud.\n📌 Amalda: Tekshiruv — jazo emas. Bu XBT vositasi. Har qanday kompaniya tekshiruvga tushishi mumkin. Asosiysi: hujjatlar haqiqiy yukka to'liq mos bo'lishi kerak.\n⚠️ Ko'p uchraydigan xato: Vahima qilish va muammoni norasmiy hal qilishga urinish. Hujjatlar tartibda bo'lsa — oqibatsiz o'tadi.", "u": "https://telegra.ph/Bojxona-tekshiruvi-06-18", "l": "uz"}, {"t": "XBT (Xavflarni boshqarish tizimi)", "s": "BOJXONA TARTIBLARI VA REJIMLARI", "b": "Bojxonaning avtomatlashtirilgan tizimi. Har bir deklaratsiyani tahlil qiladi va nazorat shaklini hal qiladi.\n🟢 Yashil yo'lak — tekshiruvsiz avtochiqarish\n🟡 Sariq yo'lak — hujjatli tekshiruv\n🔴 Qizil yo'lak — jismoniy tekshiruv\n📌 Amalda: Qizil yo'lakka tushish siz nimadir buzgansiz degani emas. Bu statistika va algoritmlar. Qanchalik uzoq toza ishlasangiz — shunchalik ko'p yashil.", "u": "https://telegra.ph/XBT-Xavflarni-boshqarish-tizimi-06-18", "l": "uz"}, {"t": "Invoys (tijorat hisob-fakturasi)", "s": "HUJJATLAR", "b": "Sotuvchidan xaridorga bitimning asosiy hujjati. Bojxona qiymatining asosi. Invoysdа majburiy: TN VED kodi, miqdor, og'irlik, narx, valyuta, Incoterms, kelib chiqish mamlakati, tomonlar rekvizitlari.\n⚠️ Ko'p uchraydigan xato: 'Faqat narxi bo'lsa bo'ldi' deb ixtiyoriy shaklda invoys qabul qilish. Noto'g'ri rasmiylashtirilgan invoys — kechikishlar va BTSning asosiy sababi.", "u": "https://telegra.ph/Invoys-tijorat-hisob-fakturasi-06-18", "l": "uz"}, {"t": "Qadoqlash varaqasi (Packing List)", "s": "HUJJATLAR", "b": "Har bir yuk o'rnining tarkibini batafsil ro'yxati. Usiz bojxona har bir qutida nima borligini tushunmaydi — tekshiruv xavfi oshadi.\n⚠️ Ko'p uchraydigan xato: O'rinlarga bo'lish o'rniga umumiy ro'yxat yuborish. Tekshiruvda inspektor har bir aniq qutining tarkibini ko'rishi kerak.", "u": "https://telegra.ph/Qadoqlash-varaqasi-Packing-List-06-18", "l": "uz"}, {"t": "CMR", "s": "HUJJATLAR", "b": "Avtomobil tashishidagi transport xati. Xalqaro standart — CMR Konventsiyasini imzolagan barcha mamlakatlarda amal qiladi. O'zbekistonga yuklarning aksariyati avtotransport bilan keladi.", "u": "https://telegra.ph/CMR-06-18-2", "l": "uz"}, {"t": "TIR (MDP kitobchasi)", "s": "HUJJATLAR", "b": "Avtomobil tashishlaridagi xalqaro bojxona tranziti tizimi. TIR kitobchasi — marshrut bo'ylab barcha mamlakatlarda bojxona to'lovlari kafolati. Usiz — har bir tranzit mamlakatda alohida bojxona rasmiylashtiriladi.\n📌 Amalda: Yevropa va Turkiyadan keluvchi yuk mashinalari O'zbekistonga TIR orqali keladi. Kitobcha jo'natish mamlakatida ochiladi, O'zbekistonda yopiladi.\n⚠️ Ko'p uchraydigan xato: TIR va CMRni aralashtirib yuborish. CMR — tashish shartnomasi. TIR — bojxona tranzit hujjati. Birga boradilar, lekin turli hujjatlar.", "u": "https://telegra.ph/TIR-MDP-kitobchasi-06-18", "l": "uz"}, {"t": "Konosament (Bill of Lading, B/L)", "s": "HUJJATLAR", "b": "Dengiz tashishidagi transport hujjati. Bir vaqtning o'zida: tashish shartnomasi, kapitan tilxati va tovar-tasarruf hujjati.\n⚠️ Ko'p uchraydigan xato: Konosament kimga rasmiylashtirilganini nazorat qilmaslik. Ekspeditorga bo'lsa — olishda muammolar bo'lishi mumkin.", "u": "https://telegra.ph/Konosament-Bill-of-Lading-BL-06-18-2", "l": "uz"}, {"t": "Havo yuk xati (Air Waybill, AWB)", "s": "HUJJATLAR", "b": "Havo tashishidagi transport hujjati. Konosamentdan farqli o'laroq — tovar-tasarruf hujjati emas. Shoshilinch, yuqori qiymatli yoki tez buzuladigan yuklarда ishlatiladi.", "u": "https://telegra.ph/Havo-yuk-xati-Air-Waybill-AWB-06-18", "l": "uz"}, {"t": "Temir yo'l xati (SMGS/CIM)", "s": "HUJJATLAR", "b": "Temir yo'l tashishidagi transport hujjati. SMGS — MDH mamlakatlari uchun, CIM — Yevropa uchun. Rossiya, Qozog'iston, Xitoydan katta partiyalarni yetkazishning asosiy usuli.", "u": "https://telegra.ph/Temir-yol-xati-SMGSCIM-06-18", "l": "uz"}, {"t": "Eksport mamlakatining eksport deklaratsiyasi", "s": "HUJJATLAR", "b": "Chet el sotuvchisi tovarni o'z mamlakatida olib chiqishda rasmiylashtirgan hujjat. Tovar e'lon qilingan narxda mamlakatni qonuniy tark etganini tasdiqlaydi.\n📌 Amalda: O'zbek bojxonasi BTS da so'raydi. Narx invoys bilan mos kelsa — BTSga qarshi kuchli argument.\n⚠️ Ko'p uchraydigan xato: Yetkazib beruvchidan oldindan so'ramaslik. Jo'natilgandan keyin olish qiyinroq.", "u": "https://telegra.ph/Eksport-mamlakatining-eksport-deklaratsiyasi-06-18", "l": "uz"}, {"t": "Sug'urta polisi (kargo-sug'urta)", "s": "HUJJATLAR", "b": "Tashish vaqtida yukni sug'urtalanganligini tasdiqlovchi hujjat. Yo'qolish, shikastlanish, o'g'irlik xavflarini qoplaydi.\nCIF da sotuvchi sug'urtalaydi — lekin minimal qoplash (ICC C, 110%). To'liq qoplash uchun — shartnomada ICC A ni ko'rsating. EXW, FOB da — o'zingiz sug'urtalaasiz. Sug'urta mukofoti bojxona qiymatiga kiritiladi.", "u": "https://telegra.ph/Sugurta-polisi-kargo-sugurta-06-18", "l": "uz"}, {"t": "Kelib chiqish sertifikati", "s": "HUJJATLAR", "b": "Tovarning kelib chiqish mamlakatini tasdiqlovchi hujjat. Preferentsial boj stavkasiga hуқуқ beradi.\nST-1 → MDH mamlakatlari → boj 0% yoki kamaytirilgan\nEUR.1 → YeI tovarlari → alohida guruhlar uchun kamaytirilgan\nForm A → GSP (rivojlanayotgan mamlakatlar) → kamaytirilgan\nCO (Certificate of Origin) → universal, preferentsiyasiz\n⚠️ Ko'p uchraydigan xato: Jo'natilgandan keyin sertifikat so'rash. Ba'zi turlar (masalan ST-1) faqat jo'natishdan oldin rasmiylashtiriladi.", "u": "https://telegra.ph/Kelib-chiqish-sertifikati-06-18", "l": "uz"}, {"t": "ST-1", "s": "HUJJATLAR", "b": "MDH mamlakatlari tovarlarining kelib chiqish sertifikati. Nol yoki kamaytrilgan boj stavkasiga hуқуқ beradi. Eksport mamlakatining Savdo-sanoat palatasi tomonidan beriladi.\nMamlakatlar: Rossiya, Qozog'iston, Belarus, Qirg'iziston, Tojikiston, Armaniston, Ozarbayjon, Moldova, Ukraina.", "u": "https://telegra.ph/ST-1-06-18-2", "l": "uz"}, {"t": "Shartnoma (tashqi savdo)", "s": "HUJJATLAR", "b": "Siz va chet el hamkoringiz o'rtasidagi asosiy yuridik hujjat.\nTomonlarning to'liq rekvizitlari\nTovar tavsifi (nomi, TN VED kodi, miqdori, sifati)\nNarx va valyuta\nYetkazib berish shartlari (Incoterms)\nTo'lov shartlari (oldindan to'lov, akkreditiv, kechiktirish)\nRuxsat beruvchi hujjatlarni rasmiylаshtirish tartibi\nQo'llaniladigan huquq va nizolarni hal qilish tartibi\n⚠️ Ko'p uchraydigan xato: Kelib chiqish sertifikati va ruxsat beruvchi hujjatlarni kim rasmiylаshtirishi ko'rsatilmagan. Keyin ma'lum bo'ladiki, hech kim qilmagan.", "u": "https://telegra.ph/Shartnoma-tashqi-savdo-06-18", "l": "uz"}, {"t": "Shartnomaga spetsifikatsiya", "s": "HUJJATLAR", "b": "Shartnomaga ilova — har bir partiyaning batafsil tavsifi: nomlar, artikullar, miqdor, narxlar. Shartnomaning ajralmas qismi. Muntazam yetkazib berishda rамкалik shartnoma + spetsifikatsiya qulayroq.", "u": "https://telegra.ph/Shartnomaga-spetsifikatsiya-06-18", "l": "uz"}, {"t": "Sifat sertifikati", "s": "HUJJATLAR", "b": "Ishlab chiqaruvchi yoki mustaqil laboratoriyaning muayyan tovar partiyasi sifat ko'rsatkichlarini tasdiqlovchi hujjati.\n📌 Muhim: Muvofiqlik sertifikati bilan aralashtirib yubormaslik. Sifat sertifikati — ishlab chiqaruvchidan, partiya uchun. Muvofiqlik sertifikati — akkreditatsiyalangan organdan, texreglamentga muvofiqlik uchun.", "u": "https://telegra.ph/Sifat-sertifikati-06-18", "l": "uz"}, {"t": "Texnik pasport / Foydalanish qo'llanmasi", "s": "HUJJATLAR", "b": "Texnika va uskunalar uchun ishlab chiqaruvchi hujjatlari. Uskunalar, elektronika, tibbiy texnikani olib kirishda majburiy. Rus yoki o'zbek tilida bo'lishi — yoki notarial tasdiqlangan tarjima bilan.", "u": "https://telegra.ph/Texnik-pasport--Foydalanish-qollanmasi-06-18", "l": "uz"}, {"t": "Qabul-topshirish dalolatnomasi", "s": "HUJJATLAR", "b": "Tovarning sotuvchidan xaridorga haqiqiy topshirilishini qayd etuvchi hujjat: sana, joy, holat, miqdor. Imzolangan dalolatnoma — tovar munosib holatda qabul qilinganining isboti.\n⚠️ Ko'p uchraydigan xato: Dalolatnoma yo'qligida tashuvchi yoki sotuvchiga kamomad yoki shikast yuzasidan da'vo qo'yish qiyinlashadi.", "u": "https://telegra.ph/Qabul-topshirish-dalolatnomasi-06-18", "l": "uz"}, {"t": "Bitim pasporti", "s": "HUJJATLAR", "b": "Tashqi savdo shartnomasini vakolatli bankda ro'yxatdan o'tkazish. Shartnoma summasi belgilangan chegaradan oshganda majburiy. Bitim pasportisiz bank xorijga to'lovni o'tkazmaydi.\n⚠️ Ko'p uchraydigan xato: Bitim pasportini ochishdan oldin chet el yetkazib beruvchisiga to'lash. Bank to'lovni bloklaydi.", "u": "https://telegra.ph/Bitim-pasporti-06-18", "l": "uz"}, {"t": "Muvofiqlik sertifikati", "s": "RUXSAT BERUVCHI HUJJATLAR", "b": "Tasdiq: tovar O'zbekiston texnik talablari va standartlariga javob beradi. Akkreditatsiyalangan sertifikatsiya organi tomonidan laboratoriya sinovlaridan o'tgandan keyin beriladi. Usiz bojxona tovarni chiqarmaydi.\n⚠️ Ko'p uchraydigan xato: Yuk VXS da turganida sertifikat rasmiylashtirish boshlanadi. Sertifikat jo'natish bilan bir vaqtda buyurtma qilinadi.", "u": "https://telegra.ph/Muvofiqlik-sertifikati-06-18", "l": "uz"}, {"t": "7A sxemasi", "s": "RUXSAT BERUVCHI HUJJATLAR", "b": "Importchilar uchun eng keng tarqalgan sertifikatsiya sxemasi. Sertifikat aniq shartnomaga beriladi, amal qilish muddati — 1 yil. Bitta sertifikat yil davomida ushbu shartnoma bo'yicha barcha yetkazib berishlarni qoplaydi.\nNima kerak: TN VED kodi va tavsif, shartnoma va invoys, texhujjatlar, laboratoriya sinovlari uchun namunalar.", "u": "https://telegra.ph/7A-sxemasi-06-18", "l": "uz"}, {"t": "Gigienik xulosa", "s": "RUXSAT BERUVCHI HUJJATLAR", "b": "Inson yoki atrof-muhit bilan aloqa qiladigan tovarlarni olib kirish uchun sanitariya nazorati organlarining ruxsati. Organ: Davlat sanitariya-epidemiologiya nazorati (sanepid.uz).\nKosmetika va parfyumeriya\nIdish-tovoq va oshxona uskunchalari\nBolalar tovarlari va o'yinchoqlar\nOziq-ovqat mahsulotlari, BADlar\nMaishiy kimyo va tozalash vositalari\n📌 Amalda: Ko'pincha muvofiqlik sertifikati bilan bir vaqtda talab qilinadi. TN VED kodi bo'yicha oldindan aniqlang.", "u": "https://telegra.ph/Gigienik-xulosa-06-18", "l": "uz"}, {"t": "Veterinariya sertifikati", "s": "RUXSAT BERUVCHI HUJJATLAR", "b": "Hayvonlar va hayvon kelib chiqishidagi mahsulotlarni olib kirish uchun veterinariya xizmatining ruxsati. Organ: Davlat veterinariya xizmati (vetgov.uz). Eksport mamlakatining vetsertifikati — chegara oldida majburiy.\nTirik hayvonlar va parrandalar\nGo'sht va go'sht mahsulotlari\nBaliq va dengiz mahsulotlari\nSut va sut mahsulotlari, tuxum\nHayvon uchun ozuqalar, teri, jun", "u": "https://telegra.ph/Veterinariya-sertifikati-06-18", "l": "uz"}, {"t": "Fitosanitariya sertifikati", "s": "RUXSAT BERUVCHI HUJJATLAR", "b": "O'simliklar va o'simlik mahsulotlarini olib kirish uchun karantin xizmatining ruxsati. Organ: Davlat karantin inspeksiyasi (karantin.uz). Karantin ob'ektlarining eng kichik belgilarida yuk ushlanib qolishi yoki yo'q qilinishi mumkin.\nYangi mevalar va sabzavotlar\nUrug'lar va ko'chatlar\nDon va uni mahsulotlari\nKesilgan gullar, o'simlik xom ashyosi", "u": "https://telegra.ph/Fitosanitariya-sertifikati-06-18", "l": "uz"}, {"t": "Ro'yxatdan o'tkazish guvohnomasi (RG)", "s": "RUXSAT BERUVCHI HUJJATLAR", "b": "Dori vositalari va tibbiy buyumlarni olib kirish uchun maxsus ruxsat. Usiz bojxona tibbiy texnika va dorilarni umuman chiqarmaydi. Olish muddati — bir necha oydan. Organ: Farmatsevtika sanoatini rivojlantirish agentligi (miit.uz).\n⚠️ Ko'p uchraydigan xato: RGsiz tibbiy buyum olib kirish, 'keyin hal qilamiz' deb. Yuk bojxonada hibsga olinadi.", "u": "https://telegra.ph/Royxatdan-otkazish-guvohnomasi-RG-06-18", "l": "uz"}, {"t": "Import/eksport litsenziyasi", "s": "RUXSAT BERUVCHI HUJJATLAR", "b": "Alohida tovar toifalarini olib kirish yoki olib chiqish uchun maxsus davlat ruxsati. Litsenziyasiz nafaqat bojxona chiqarmaydi, balki jinoiy javobgarlik ham mumkin. Shartnoma tuzishdan oldin lex.uz da ro'yxatni tekshiring.\nImport: qurol-yarog', narkotik moddalar, ikki maqsadli tovarlar, qimmatbaho metallar\nEksport: strategik xom ashyo, antikvar va madaniy qadriyatlar", "u": "https://telegra.ph/Importeksport-litsenziyasi-06-18", "l": "uz"}, {"t": "Incoterms 2020", "s": "YETKAZIB BERISH SHARTLARI INCOTERMS 2020", "b": "ICC ning xalqaro qoidalari. Har qanday savdo bitimida uchta savolga javob beradi: yetkazib berishni kim to'laydi va qaysi momentgacha, yukni yo'qolishi xavfini kim ko'taradi, kim hujjatlar va ruxsatlarni rasmiylаshtiradi.\nBojxona uchun: yetkazib berish sharti bojxona qiymatini belgilaydi. O'zbek bojxonasi CIF asosida hisoblaydi. Boshqa shart bo'lsa — CIF ga qayta hisoblanadi.", "u": "https://telegra.ph/Incoterms-2020-06-18", "l": "uz"}, {"t": "EXW (Ex Works — zavod franko)", "s": "YETKAZIB BERISH SHARTLARI INCOTERMS 2020", "b": "Sotuvchi minimumni qildi: tovarni o'z omborida tayyorladi. Qolgan hammasi — sizning tashvishingiz. Xarajatlar: yuklash + ichki tashish + eksport rasmiylashtirish + xalqaro tashish + sug'urta + omboringizga yetkazish.\n📌 Bojxona uchun: EXW da bojxona qiymati = invoys narxi + O'zbekiston CHEGARASIGACHA BARCHA xarajatlar.", "u": "https://telegra.ph/EXW-Ex-Works--zavod-franko-06-18", "l": "uz"}, {"t": "FOB (Free On Board — bort franko)", "s": "YETKAZIB BERISH SHARTLARI INCOTERMS 2020", "b": "Sotuvchi tovarni jo'natish portida kemaga yuklagungacha yetkazadi. Yuklagandan keyin — xavf sizniki. Faqat dengiz tashishlari uchun.\n📌 Bojxona uchun: FOB da bojxona qiymati = FOB narxi + chegaragacha fracht + sug'urta. Fracht qo'shishni unutmang — bu BTSning tez-tez sababi.", "u": "https://telegra.ph/FOB-Free-On-Board--bort-franko-06-18", "l": "uz"}, {"t": "CIF (Cost, Insurance, Freight)", "s": "YETKAZIB BERISH SHARTLARI INCOTERMS 2020", "b": "Sotuvchi tayinlash portiga fracht va sug'urtani to'laydi. CIF — O'zbekistonda bojxona qiymatini hisoblashning asosiy sharti. Barcha boshqa shartlar unga qayta hisoblanadi.\n⚠️ Amalda: Sotuvchi sug'urtani tanlaydi — sukut bo'yicha minimal qoplash (ICC C). To'liq qoplash kerak bo'lsa — shartnomada ICC A ni ko'rsating.", "u": "https://telegra.ph/CIF-Cost-Insurance-Freight-06-18-2", "l": "uz"}, {"t": "DAP (Delivered At Place)", "s": "YETKAZIB BERISH SHARTLARI INCOTERMS 2020", "b": "Sotuvchi tovarni O'zbekistondagi omboringizga yetkazib beradi. Bojxona rasmiylashtirish va to'lovlar — sizning vazifangiz.\n📌 Bojxona uchun: DAP da bojxona qiymati = DAP narxi minus O'zbekiston chegarasidan keyingi xarajatlar. Ekspeditordan 'chegaradan' hisobini so'rang.", "u": "https://telegra.ph/DAP-Delivered-At-Place-06-18-2", "l": "uz"}, {"t": "DDP (Delivered Duty Paid)", "s": "YETKAZIB BERISH SHARTLARI INCOTERMS 2020", "b": "Sotuvchi mutlaqo hammasini o'z zimmasiga oladi: yetkazib berish, bojxona rasmiylashtirish, barcha boj va soliqlarni to'lash. O'zbekistonda kamdan-kam uchraydi.\n⚠️ Ehtiyot bo'ling: DDP da bojxona rasmiylashtirish ustidan nazoratni yo'qotasiz. Tekshiruvda da'volar — qabul qiluvchi sifatida sizga.", "u": "https://telegra.ph/DDP-Delivered-Duty-Paid-06-18-2", "l": "uz"}, {"t": "Valyuta nazorati", "s": "VALYUTA NAZORATI VA BANK", "b": "Davlatning chet el valyutasi harakatini kuzatish tizimi. O'zbekistonda Markaziy bank (cbu.uz) vakolatli tijorat banklari orqali amalga oshiradi. Xorijga har bir to'lov va tushum kuzatiladi va shartnoma bilan solishtiriladi.", "u": "https://telegra.ph/Valyuta-nazorati-06-18", "l": "uz"}, {"t": "Repatriatsiya", "s": "VALYUTA NAZORATI VA BANK", "b": "Eksportchining valyuta daromadini belgilangan muddatlarda O'zbekistondagi bank hisobiga qaytarish majburiyati.\n⚠️ Ko'p uchraydigan xato: Chet el xaridoriga bank bilan kelishmasdan uzun to'lovni kechiktirish berish. Repatriatsiya muddatlari belgilangan — ularni buzish shartnoma shartlaridan bog'liq emas.", "u": "https://telegra.ph/Repatriatsiya-06-18", "l": "uz"}, {"t": "Konvertatsiya", "s": "VALYUTA NAZORATI VA BANK", "b": "Ichki hisob-kitoblar yoki bojxona to'lovlarini to'lash uchun chet el valyutasini so'mga almashtirish. Bojxona to'lovlari deklaratsiya topshirilgan kundagi MB kursi bo'yicha hisoblanadi. Kurs har kuni o'zgaradi.\n📌 Maslahat: Yetkazib berish byudjetini rejalashtirishda kurs farqi uchun kichik zaxira qoldiring.", "u": "https://telegra.ph/Konvertatsiya-06-18", "l": "uz"}, {"t": "Valyuta sharti", "s": "VALYUTA NAZORATI VA BANK", "b": "Kurs o'zgarishi xavfidan himoya qiluvchi shartnomadagi shart. Kurs o'zgarganda narx qaysi valyutada qayta hisoblanishini belgilaydi. Ogohlantirish yo'q bo'lsa — hamkorlardan biri pul yo'qotadi.", "u": "https://telegra.ph/Valyuta-sharti-06-18", "l": "uz"}, {"t": "DTQ (Davlat Bojxona Qo'mitasi)", "s": "TASHKILOTLAR VA MANBALAR", "b": "O'zbekistonning asosiy bojxona organi. Deklaratsiyalarni qabul qiladi, tovarlar harakatini nazorat qiladi, rasmiylashtirish qoidalarini belgilaydi. Sayt: customs.uz. Tariflar va kodlar: tariff.customs.uz.", "u": "https://telegra.ph/DTQ-Davlat-Bojxona-Qomitasi-06-18", "l": "uz"}, {"t": "O'zstandart", "s": "TASHKILOTLAR VA MANBALAR", "b": "O'zbekiston texnik tartibga solish va metrologiya agentligi. Standartlar ishlab chiqadi, sertifikatsiya organlarini va sinash laboratoriyalarini akkreditatsiya qiladi. Sayt: standart.uz.", "u": "https://telegra.ph/Ozstandart-06-18", "l": "uz"}, {"t": "O'ZAKK (O'zbekiston Akkreditatsiya Markazi)", "s": "TASHKILOTLAR VA MANBALAR", "b": "Barcha akkreditatsiyalangan sertifikatsiya organlari va sinash laboratoriyalarining rasmiy rejestrini yuritadi. Sayt: akkred.uz. Murojaat qilishdan oldin holatni tekshiring.\n⚠️ Ko'p uchraydigan xato: Akkreditatsiyani tekshirmasdan organ bilan ishlash. Akkreditatsiya yo'qolsa — sertifikat haqiqiy emas.", "u": "https://telegra.ph/OZAKK-Ozbekiston-Akkreditatsiya-Markazi-06-18", "l": "uz"}, {"t": "Yagona darcha (Single Window)", "s": "TASHKILOTLAR VA MANBALAR", "b": "Elektron shaklda ruxsat beruvchi hujjatlar olish uchun davlat portali. Bitta kirish — barcha idoralar. TN VED kodi bo'yicha hujjat kerakligini tekshirish, onlayn ariza, holatni kuzatish — hammasi singlewindow.uz da.", "u": "https://telegra.ph/Yagona-darcha-Single-Window-06-18", "l": "uz"}, {"t": "Lex.uz", "s": "TASHKILOTLAR VA MANBALAR", "b": "O'zbekiston Respublikasining rasmiy normativ-huquqiy hujjatlar bazasi. Qonunlar, hukumat qarorlari, idora buyruqlari — amaldagi tahririda. Stavka, imtiyoz, talab yoki taqiq bo'yicha har qanday bayonotni tekshirish uchun birlamchi manba.", "u": "https://telegra.ph/Lexuz-06-18-2", "l": "uz"}, {"t": "Tariff.customs.uz", "s": "TASHKILOTLAR VA MANBALAR", "b": "Bojxona boji stavkalari, TN VED kodlari va qo'shimcha izohlar bilan DTQning rasmiy portali. Har qanday tovar bilan ishlashda birinchi ochadigan saytingiz. Bepul, dolzarb, rasmiy.\nVED Wiki qonunchilik o'zgarishlariga qarab yangilanib turadi\nInCustom-Helper  ·  incustoms.uz  ·  @incustoms_uz", "u": "https://telegra.ph/Tariffcustomsuz-06-18-2", "l": "uz"}];
  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { tg.ready(); tg.expand(); }
  const params = new URLSearchParams(location.search);
  let lang = params.get('lang') === 'uz' ? 'uz' : 'ru';
  const T = {
    ru: {ph:'Поиск термина…', n:n=>n+' терминов', empty:'Ничего не найдено'},
    uz: {ph:'Atama qidirish…', n:n=>n+' ta atama', empty:'Hech narsa topilmadi'}
  };
  const items = DATA.filter(d => d.l === lang);
  const norm = s => (s||'').toLowerCase().replace(/[^0-9a-zа-яёʻ\u02bb' ]/g,'');
  const q = document.getElementById('q');
  const list = document.getElementById('list');
  const count = document.getElementById('count');
  q.placeholder = T[lang].ph;
  function render(arr){
    count.textContent = T[lang].n(arr.length);
    if(!arr.length){ list.innerHTML = '<div class="empty">'+T[lang].empty+'</div>'; return; }
    list.innerHTML = arr.map((d,i)=>(
      '<div class="item" data-i="'+i+'">'+
        '<div class="term">'+
          '<span>'+esc(d.t)+(d.s?'<div class="sec">'+esc(d.s)+'</div>':'')+'</span>'+
          '<span class="arrow">▸</span>'+
        '</div>'+
        '<div class="body">'+esc(d.b)+'</div>'+
      '</div>'
    )).join('');
  }
  function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
  let cur = items.slice().sort((a,b)=>a.t.toUpperCase()<b.t.toUpperCase()?-1:1);
  function filter(){
    const v = norm(q.value);
    cur = items.filter(d => !v || norm(d.t).includes(v) || norm(d.b).includes(v))
               .sort((a,b)=>{
                 const an=norm(a.t).startsWith(v), bn=norm(b.t).startsWith(v);
                 if(an!==bn) return an?-1:1;
                 return a.t.toUpperCase()<b.t.toUpperCase()?-1:1;
               });
    render(cur);
  }
  list.addEventListener('click', e=>{
    const it = e.target.closest('.item'); if(it) it.classList.toggle('open');
  });
  q.addEventListener('input', filter);
  filter();
</script>
